        shell: bash
        env:
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          CONTROLLER_COMMIT: ${{ inputs.controller_commit }}
          CONTROLLER_DIGEST: ${{ inputs.controller_digest }}
          ADAPTER_DIGEST: ${{ inputs.adapter_digest }}
          ARTIFACT_DIGESTS_B64: ${{ inputs.artifact_digests_b64 }}
          HEALTH_CHECKS_B64: ${{ inputs.health_checks_b64 }}
          TARGET_FINGERPRINT: ${{ inputs.target_fingerprint }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const decode = (name) => JSON.parse(Buffer.from(process.env[name], "base64url"));
          const checks = decode("HEALTH_CHECKS_B64");
          const names = ["published Form Package closure readback", "OpenTofu and Terraform Registry admission readback", "signed portable-standard admission closure readback", "immutable admission release asset readback"];
