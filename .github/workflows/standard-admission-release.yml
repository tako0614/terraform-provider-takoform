          const parameters = definition.externalParameters;
          const builderId = "https://github.com/tako0614/terraform-provider-takoform/.github/workflows/standard-admission-release.yml@refs/heads/main";
          if (definition.buildType !== contract.provenance.buildType || parameters.sourceCommit !== process.env.SOURCE_COMMIT || parameters.tag !== process.env.RELEASE_TAG || parameters.version !== process.env.VERSION || parameters.admissionReleaseVersion !== process.env.VERSION || parameters.definitionVersion !== set.definitionVersion || parameters.packageVersion !== set.packageVersion || parameters.workflow !== ".github/workflows/standard-admission-release.yml" || provenance.predicate.runDetails?.builder?.id !== builderId || definition.internalParameters.packageCount !== contract.provenance.packageCount || definition.internalParameters.retainedSubjectCount !== contract.provenance.retainedSubjectCount || definition.internalParameters.standardAdmissionSetDigest !== candidate.configDigest || definition.internalParameters.offlineSigstorePinsDigest !== candidate.policyDigest) process.exit(1);
          const dependencies = definition.resolvedDependencies;
          const packageDependencies = new Map(dependencies.filter(({ name }) => name.startsWith("form-package:")).map((item) => [item.name.slice("form-package:".length), `sha256:${item.digest.sha256}`]));
          const subjectDependencies = new Map(dependencies.filter(({ name }) => name.startsWith("retained-subject:")).map((item) => [item.name.slice("retained-subject:".length), `sha256:${item.digest.sha256}`]));
          const rootDependencies = new Map(dependencies.filter(({ name }) => !name.startsWith("form-package:") && !name.startsWith("retained-subject:")).map((item) => [item.name, item.digest]));
          if (dependencies.length !== contract.provenance.resolvedDependencyCount || packageDependencies.size !== contract.provenance.resolvedDependencyPartitions.formPackage || subjectDependencies.size !== contract.provenance.resolvedDependencyPartitions.retainedSubject || rootDependencies.size !== contract.provenance.resolvedDependencyPartitions.root || JSON.stringify([...rootDependencies.keys()]) !== JSON.stringify(contract.provenance.rootDependencyNames) || rootDependencies.get("tagged-admission-source")?.gitCommit !== process.env.SOURCE_COMMIT || rootDependencies.get("protected-main-release-tooling")?.gitCommit !== process.env.SOURCE_COMMIT || `sha256:${rootDependencies.get("offline-sigstore-pins")?.sha256}` !== candidate.policyDigest) process.exit(1);
