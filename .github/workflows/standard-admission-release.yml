          fs.writeFileSync("release-safety-readback.json", `${JSON.stringify(result)}\n`);
          NODE
      - name: Create, verify, and publish this run's draft
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          release="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" -f tag_name="${RELEASE_TAG}" -f name="${RELEASE_TAG}" -F draft=true -F prerelease=false -f body='Takoform portable-standard admission. Provider and package publication alone do not grant this status.')"
          release_id="$(jq -er .id <<<"${release}")"
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"
          test "$(jq -r '.assets | length' <<<"${release}")" = 0
          while IFS= read -r name; do gh release upload "${RELEASE_TAG}" "candidate/${name}"; done < <(jq -r '.releaseAssets[].name' candidate/release-candidate-manifest.json)
          gh release upload "${RELEASE_TAG}" release-safety-readback.json
          actual="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" --jq '.[].name' | sort)"
          expected="$( { jq -r '.releaseAssets[].name' candidate/release-candidate-manifest.json; echo release-safety-readback.json; } | sort )"
          diff -u <(printf '%s\n' "${expected}") <(printf '%s\n' "${actual}")
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" -F draft=false >/dev/null
      - name: Read back immutable admission and every exact byte
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          jq -e --arg tag "${RELEASE_TAG}" '.tag_name == $tag and .draft == false and .prerelease == false and .immutable == true' <<<"${release}" >/dev/null
          readback="$(mktemp -d)"
          while IFS=$'\t' read -r name digest; do
            url="$(jq -er --arg name "${name}" '.assets[] | select(.name == $name) | .url' <<<"${release}")"
            gh api "${url}" --header 'Accept: application/octet-stream' > "${readback}/${name}"
            test "sha256:$(sha256sum "${readback}/${name}" | cut -d' ' -f1)" = "${digest}"
          done < <(jq -r '.releaseAssets[] | [.name, .digest] | @tsv' candidate/release-candidate-manifest.json)
          readback_url="$(jq -er '.assets[] | select(.name == "release-safety-readback.json") | .url' <<<"${release}")"
          gh api "${readback_url}" --header 'Accept: application/octet-stream' > "${readback}/release-safety-readback.json"
          cmp -s release-safety-readback.json "${readback}/release-safety-readback.json"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/standard-admission-release.yml@refs/heads/main"
          cosign verify-blob "${readback}/standard-admission-set.json" --bundle "${readback}/standard-admission-set.sigstore.json" \
            --certificate-identity "${identity}" --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          gh attestation verify "${readback}/standard-admission-set.json" --repo "${GITHUB_REPOSITORY}"
          gh attestation verify "${readback}/takoform-standard-admission-v1.tar.gz" --repo "${GITHUB_REPOSITORY}"
      - name: Remove only this run's unpublished draft after failure
        if: ${{ always() && !success() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_ID}" ]]; then exit 0; fi
          release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" 2>/dev/null || true)"
          if [[ -n "${release}" && "$(jq -r .tag_name <<<"${release}")" = "${RELEASE_TAG}" && "$(jq -r .draft <<<"${release}")" = true ]]; then
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"
          fi
