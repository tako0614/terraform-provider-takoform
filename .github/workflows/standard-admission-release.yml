          if (expectedPackages.size !== contract.provenance.packageCount || expectedSubjects.size !== contract.retainedSubjects.count) process.exit(1);

          const sbom = JSON.parse(fs.readFileSync(path.join("candidate", sbomName), "utf8"));
          if (sbom.spdxVersion !== contract.sbom.spdxVersion || sbom.dataLicense !== contract.sbom.dataLicense || sbom.packages.length !== contract.sbom.packageCount || sbom.files.length !== contract.sbom.fileCount || sbom.relationships.length !== contract.sbom.relationshipCount) process.exit(1);
          const sbomFiles = new Map(sbom.files.map((file) => [file.fileName.replace(/^\.\/v1\//, ""), `sha256:${file.checksums?.find(({ algorithm }) => algorithm === "SHA256")?.checksumValue}`]));
          if (sbomFiles.size !== contract.sbom.fileCount) process.exit(1);
          for (const [subjectPath, subject] of expectedSubjects) if (sbomFiles.get(subjectPath) !== subject.digest) process.exit(1);
          const rootPackages = sbom.packages.filter(({ SPDXID }) => SPDXID === contract.sbom.rootPackageSpdxId);
          if (rootPackages.length !== 1 || rootPackages[0].versionInfo !== process.env.VERSION) process.exit(1);
          const componentPackages = sbom.packages.filter(({ SPDXID }) => SPDXID !== contract.sbom.rootPackageSpdxId);
          if (componentPackages.length !== contract.sbom.componentPackageCount || new Set(componentPackages.map(({ SPDXID }) => SPDXID)).size !== componentPackages.length) process.exit(1);
          for (const pkg of componentPackages) {
