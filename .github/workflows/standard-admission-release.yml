          created_at="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq .created_at)"
          now_epoch="$(date -u +%s)"
          created_epoch="$(date -u -d "${created_at}" +%s)"
          expires_at="$(jq -er .expiresAt <<<"${AUTHORIZATION_SECRET_JSON}")"
          expires_epoch="$(date -u -d "${expires_at}" +%s)"
          age_seconds="$((now_epoch - created_epoch))"
          remaining_seconds="$((expires_epoch - now_epoch))"
          (( age_seconds >= 0 && age_seconds <= 300 ))
          (( remaining_seconds > 0 && remaining_seconds <= 300 ))
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2, Cosign v3.0.6
      - name: Verify the exact candidate run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          set -euo pipefail
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CANDIDATE_RUN_ID}")"
          jq -e --arg source "${SOURCE_COMMIT}" '.head_sha == $source and .event == "workflow_dispatch" and .status == "completed" and .conclusion == "success" and .run_attempt == 1 and (.path | endswith("/.github/workflows/standard-admission-release.yml") or . == ".github/workflows/standard-admission-release.yml")' <<<"${run_json}" >/dev/null
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: takoform-standard-form-admission-candidate-${{ inputs.version }}-${{ needs.validate.outputs.source_commit_short }}
          path: candidate
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_run_id }}
      - name: Verify envelope bindings and every candidate byte
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_MANIFEST_DIGEST: ${{ inputs.candidate_manifest_digest }}
          ARTIFACT_DIGESTS_B64: ${{ inputs.artifact_digests_b64 }}
        run: |
          set -euo pipefail
          test "sha256:$(sha256sum candidate/release-candidate-manifest.json | cut -d' ' -f1)" = "${CANDIDATE_MANIFEST_DIGEST}"
          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");
          const candidate = JSON.parse(fs.readFileSync("candidate/release-candidate-manifest.json"));
          const sha = (raw) => `sha256:${crypto.createHash("sha256").update(raw).digest("hex")}`;
          const digestFile = (name) => sha(fs.readFileSync(name));
          const contract = JSON.parse(fs.readFileSync("admission/v1/trust/release-candidate-contract.json", "utf8"));
          const expandVersion = (value) => value.replace("{admissionReleaseVersion}", process.env.VERSION);
          const expectedNames = contract.candidateManifest.releaseAssets.map(expandVersion).sort();
          const decoded = JSON.parse(Buffer.from(process.env.ARTIFACT_DIGESTS_B64, "base64url"));
          const actualFiles = fs.readdirSync("candidate").sort();
          const candidateKeys = [...contract.candidateManifest.keys].sort();
          if (JSON.stringify(Object.keys(candidate).sort()) !== JSON.stringify(candidateKeys) || candidate.kind !== contract.candidateManifest.kind || candidate.surfaceId !== "takoform-standard-form-admission" || candidate.repository !== "https://github.com/tako0614/terraform-provider-takoform.git" || candidate.sourceCommit !== process.env.SOURCE_COMMIT || candidate.version !== process.env.VERSION || candidate.tag !== process.env.RELEASE_TAG || candidate.workflowRunId !== process.env.CANDIDATE_RUN_ID || !Array.isArray(candidate.ociImages) || candidate.ociImages.length !== contract.candidateManifest.ociImageCount || JSON.stringify(candidate.releaseAssets.map(({name}) => name).sort()) !== JSON.stringify(expectedNames) || JSON.stringify(actualFiles) !== JSON.stringify(["release-candidate-manifest.json", ...expectedNames].sort())) process.exit(1);
          for (const asset of candidate.releaseAssets) {
