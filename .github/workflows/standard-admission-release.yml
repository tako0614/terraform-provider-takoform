name: Activate Standard Form admission

on:
  workflow_dispatch:
    inputs:
      phase:
        description: Build one authenticated candidate or promote its exact bytes
        required: true
        default: candidate
        type: choice
        options:
          - candidate
          - promote
      version:
        description: Immutable stable admission release version (independent from Form definition/package version)
        required: true
        type: string
      release_id:
        description: Private-envelope release identifier (promote only)
        required: false
        default: ""
        type: string
      tag:
        description: Exact forms/admissions/v<semver> tag (promote only)
        required: false
        default: ""
        type: string
      source_commit:
        description: Exact reviewed source commit (promote only)
        required: false
        default: ""
        type: string
      candidate_run_id:
        description: Successful closed candidate workflow run id (promote only)
        required: false
        default: ""
        type: string
      candidate_manifest_digest:
        description: SHA-256 of release-candidate-manifest.json (promote only)
        required: false
        default: ""
        type: string
      envelope_digest:
        description: SHA-256 of the operator-private release envelope
        required: false
        default: ""
        type: string
      controller_commit:
        description: Pinned ecosystem release-safety controller commit
        required: false
        default: ""
        type: string
      controller_digest:
        description: Pinned ecosystem release-safety controller digest
        required: false
        default: ""
        type: string
      adapter_digest:
        description: Pinned fixed-adapter SHA-256 digest
        required: false
        default: ""
        type: string
      authorization_digest:
        description: Controller technical-authorization evidence digest
        required: false
        default: ""
        type: string
      authorization_secret_name:
        description: One-use Environment secret name created for this exact promotion dispatch
        required: false
        default: ""
        type: string
      artifact_digests_b64:
        description: Base64url ordered envelope artifact digest JSON
        required: false
        default: ""
        type: string
      health_checks_b64:
        description: Base64url required envelope health-check JSON
        required: false
        default: ""
        type: string
      target_fingerprint:
        description: Expected deterministic immutable release target fingerprint
        required: false
        default: ""
        type: string

run-name: ${{ inputs.phase == 'promote' && format('release-safety:standard-form-admission:{0}:{1}', inputs.release_id, inputs.envelope_digest) || format('standard-form-admission-candidate:{0}:{1}', inputs.version, github.sha) }}

concurrency:
  group: standard-form-admission-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  EXPECTED_COSIGN_VERSION: "v3.0.6"
  EXPECTED_GPG_FINGERPRINT: "3510E75E05BBCC303B92D77934FC18AC897FB709"
  RELEASE_SAFETY_CONTROLLER_COMMIT: "02847b87c4f8ca65ddd64d685ad71606f62ef73a"
  RELEASE_SAFETY_ADAPTER_DIGEST: "sha256:e1062551860c9d289261a2ad00779ee0edfd88a49757e4842da633d16eecc2ca"

jobs:
  validate:
    name: Validate source tag and controller bindings
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.source.outputs.version }}
      tag: ${{ steps.source.outputs.tag }}
      source_commit: ${{ steps.source.outputs.source_commit }}
      source_commit_short: ${{ steps.source.outputs.source_commit_short }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate protected main, admission tag, and fixed authority
        id: source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PHASE: ${{ inputs.phase }}
          VERSION: ${{ inputs.version }}
          REQUESTED_RELEASE_ID: ${{ inputs.release_id }}
          REQUESTED_TAG: ${{ inputs.tag }}
          REQUESTED_SOURCE_COMMIT: ${{ inputs.source_commit }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_MANIFEST_DIGEST: ${{ inputs.candidate_manifest_digest }}
          ENVELOPE_DIGEST: ${{ inputs.envelope_digest }}
          CONTROLLER_COMMIT: ${{ inputs.controller_commit }}
          CONTROLLER_DIGEST: ${{ inputs.controller_digest }}
          ADAPTER_DIGEST: ${{ inputs.adapter_digest }}
          AUTHORIZATION_DIGEST: ${{ inputs.authorization_digest }}
          AUTHORIZATION_SECRET_NAME: ${{ inputs.authorization_secret_name }}
          ARTIFACT_DIGESTS_B64: ${{ inputs.artifact_digests_b64 }}
          HEALTH_CHECKS_B64: ${{ inputs.health_checks_b64 }}
          TARGET_FINGERPRINT: ${{ inputs.target_fingerprint }}
        run: |
          set -euo pipefail
          test "${GITHUB_RUN_ATTEMPT}" = "1" || {
            echo "Release runs are immutable; dispatch a new version/attempt." >&2
            exit 1
          }
          [[ "${VERSION}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          release_tag="forms/admissions/v${VERSION}"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${release_tag}")"
          tag_object_sha="$(jq -er '.object.sha' <<<"${ref_json}")"
          jq -e '.object.type == "tag"' <<<"${ref_json}" >/dev/null
          tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
          jq -e --arg source "${GITHUB_SHA}" \
            '.object.type == "commit" and .object.sha == $source and .verification.verified == true' \
            <<<"${tag_json}" >/dev/null

          promotion_values=(REQUESTED_RELEASE_ID REQUESTED_TAG REQUESTED_SOURCE_COMMIT CANDIDATE_RUN_ID CANDIDATE_MANIFEST_DIGEST ENVELOPE_DIGEST CONTROLLER_COMMIT CONTROLLER_DIGEST ADAPTER_DIGEST AUTHORIZATION_DIGEST AUTHORIZATION_SECRET_NAME ARTIFACT_DIGESTS_B64 HEALTH_CHECKS_B64 TARGET_FINGERPRINT)
          if [[ "${PHASE}" = candidate ]]; then
            test "${GITHUB_REF}" = "refs/heads/main"
            test "$(git rev-parse refs/remotes/origin/main)" = "${GITHUB_SHA}"
            for name in "${promotion_values[@]}"; do test -z "${!name}"; done
            if gh release view "${release_tag}" >/dev/null 2>&1; then
              echo "Admission ${release_tag} already exists; publish a new version." >&2
              exit 1
            fi
          elif [[ "${PHASE}" = promote ]]; then
            test "${GITHUB_REF}" = "refs/tags/${release_tag}"
            for name in "${promotion_values[@]}"; do test -n "${!name}"; done
            test "${REQUESTED_TAG}" = "${release_tag}"
            test "${REQUESTED_SOURCE_COMMIT}" = "${GITHUB_SHA}"
            [[ "${CANDIDATE_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
            [[ "${CONTROLLER_COMMIT}" =~ ^[0-9a-f]{40}$ ]]
            for value in "${CANDIDATE_MANIFEST_DIGEST}" "${ENVELOPE_DIGEST}" "${CONTROLLER_DIGEST}" "${ADAPTER_DIGEST}" "${AUTHORIZATION_DIGEST}" "${TARGET_FINGERPRINT}"; do
              [[ "${value}" =~ ^sha256:[0-9a-f]{64}$ ]]
            done
            test "${CONTROLLER_COMMIT}" = "${RELEASE_SAFETY_CONTROLLER_COMMIT}"
            test "${ADAPTER_DIGEST}" = "${RELEASE_SAFETY_ADAPTER_DIGEST}"
            [[ "${AUTHORIZATION_SECRET_NAME}" =~ ^RELEASE_SAFETY_AUTHORIZATION_[0-9A-F]{32}$ ]]
          else
            echo "Unsupported release phase: ${PHASE}" >&2
            exit 1
          fi
          {
            echo "version=${VERSION}"
            echo "tag=${release_tag}"
            echo "source_commit=${GITHUB_SHA}"
            echo "source_commit_short=${GITHUB_SHA:0:12}"
          } >> "${GITHUB_OUTPUT}"

  direct-registry-readback:
    name: Isolated OpenTofu and Terraform Registry readback
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate
    if: inputs.phase == 'candidate' && needs.validate.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate.outputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true
      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # pinned: v2
        with:
          tofu_version: 1.12.1
          tofu_wrapper: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # pinned: v4.0.1
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false
      - name: Render the exact public Registry lifecycle matrix
        run: |
          set -euo pipefail
          go run ./cmd/standard-form-conformance candidate-publication-check
          go run ./cmd/provider-lifecycle-conformance render-registry-matrix \
            --opentofu tofu --terraform terraform > "${RUNNER_TEMP}/matrix.json"
          jq -S -c . "${RUNNER_TEMP}/matrix.json" > "${RUNNER_TEMP}/provider-lifecycle-matrix.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: direct-registry-readback-${{ needs.validate.outputs.source_commit }}
          path: ${{ runner.temp }}/provider-lifecycle-matrix.json
          if-no-files-found: error
          retention-days: 1

  candidate:
    name: Authenticate and close the admission candidate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [validate, direct-registry-readback]
    if: inputs.phase == 'candidate' && needs.direct-registry-readback.result == 'success'
    environment: standard-admission-release
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate.outputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2, Cosign v3.0.6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: direct-registry-readback-${{ needs.validate.outputs.source_commit }}
          path: ${{ runner.temp }}/direct-registry-readback

      - name: Authenticate the reviewed Registry readback and full closure
        shell: bash
        run: |
          set -euo pipefail
          fresh="${RUNNER_TEMP}/direct-registry-readback/provider-lifecycle-matrix.json"
          cmp admission/v1/registry/provider-lifecycle-matrix.json "${fresh}"
          FRESH="${fresh}" node <<'NODE'
          const fs = require("node:fs");
          const contract = JSON.parse(fs.readFileSync("admission/v1/trust/release-candidate-contract.json", "utf8"));
          const matrix = JSON.parse(fs.readFileSync(process.env.FRESH, "utf8"));
          const actual = matrix.reports?.map(({ cli }) => ({ product: cli?.product, executableName: cli?.executableName, providerAddress: cli?.providerAddress }));
          if (matrix.format !== contract.registryMatrix.format || matrix.installationSource !== contract.registryMatrix.installationSource || JSON.stringify(actual) !== JSON.stringify(contract.registryMatrix.products) || new Set(actual.map(({ product }) => product)).size !== actual.length) throw new Error("direct Registry matrix does not contain the exact unique OpenTofu and Terraform products");
          NODE
          fingerprints="$(gpg --batch --with-colons --import-options show-only --import release/keys/provider-signing-key.asc | awk -F: '$1 == "fpr" { print $10 }')"
          test "${fingerprints}" = "${EXPECTED_GPG_FINGERPRINT}"
          gpg --batch --import release/keys/provider-signing-key.asc
          subject="admission/v1/registry/provider-readback.json"
          bundle="admission/v1/registry/provider-readback.sigstore.json"
          test ! -e "${bundle}"
          grep -F "${EXPECTED_COSIGN_VERSION}" <<<"$(cosign version 2>&1)"
          cosign sign-blob "${subject}" --bundle "${bundle}" --yes
          cosign verify-blob "${subject}" --bundle "${bundle}" \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/standard-admission-release.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          go run ./cmd/standard-form-conformance published-package-check
          go run ./cmd/standard-form-conformance admission-closure-check

      - name: Build, sign, and checksum the immutable candidate inventory
        id: build
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          SOURCE_COMMIT: ${{ needs.validate.outputs.source_commit }}
        run: |
          set -euo pipefail
          output="${RUNNER_TEMP}/standard-admission-candidate"
          mkdir -p "${output}"
          install -m 0644 admission/v1/standard-admission-set.json "${output}/standard-admission-set.json"
          install -m 0644 "${RUNNER_TEMP}/direct-registry-readback/provider-lifecycle-matrix.json" "${output}/fresh-provider-lifecycle-matrix.json"
          tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner -C admission -cf - v1 \
            | gzip -n > "${output}/takoform-standard-admission-v1.tar.gz"
          tar -xOzf "${output}/takoform-standard-admission-v1.tar.gz" v1/registry/provider-lifecycle-matrix.json > "${RUNNER_TEMP}/archived-provider-lifecycle-matrix.json"
          cmp "${output}/fresh-provider-lifecycle-matrix.json" "${RUNNER_TEMP}/archived-provider-lifecycle-matrix.json"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/standard-admission-release.yml@refs/heads/main"
          cosign sign-blob "${output}/standard-admission-set.json" \
            --bundle "${output}/standard-admission-set.sigstore.json" --yes
          cosign verify-blob "${output}/standard-admission-set.json" \
            --bundle "${output}/standard-admission-set.sigstore.json" \
            --certificate-identity "${identity}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

          OUTPUT="${output}" node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");
          const out = process.env.OUTPUT;
          const version = process.env.VERSION;
          const commit = process.env.SOURCE_COMMIT;
          const tag = process.env.RELEASE_TAG;
          const repository = "https://github.com/tako0614/terraform-provider-takoform";
          const digest = (raw) => `sha256:${crypto.createHash("sha256").update(raw).digest("hex")}`;
          const digestFile = (name) => digest(fs.readFileSync(name));
          const hexDigest = (value) => {
            if (!/^sha256:[0-9a-f]{64}$/.test(value)) throw new Error(`invalid SHA-256 digest: ${value}`);
            return value.slice("sha256:".length);
          };
          const safeRelativePath = (value) => {
            if (typeof value !== "string" || value.length === 0 || value.includes("\\") || value.startsWith("/") || path.posix.normalize(value) !== value || value.split("/").includes("..")) throw new Error(`unsafe retained path: ${value}`);
            return value;
          };
          const spdxID = (value) => value.replace(/[^A-Za-z0-9.-]/g, "-");
          const contract = JSON.parse(fs.readFileSync("admission/v1/trust/release-candidate-contract.json", "utf8"));
          const stableVersion = /^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$/;
          const set = JSON.parse(fs.readFileSync("admission/v1/standard-admission-set.json", "utf8"));
          if (set.format !== contract.standardAdmissionSet.format || !stableVersion.test(set.definitionVersion) || !stableVersion.test(set.packageVersion) || set.definitionVersion !== set.packageVersion || set.admissionReleaseTag !== tag || !Array.isArray(set.entries) || set.entries.length !== contract.standardAdmissionSet.entryCount || JSON.stringify(set.entries.map(({ kind }) => kind)) !== JSON.stringify(contract.standardAdmissionSet.kinds)) throw new Error("standard admission set does not contain the exact versioned ten-package closure");

          const packages = [];
          const subjects = [];
          const packageDependencies = [];
          const addSubject = (entry, role, subjectPath, subjectDigest) => {
            const relative = safeRelativePath(subjectPath);
            const raw = fs.readFileSync(path.join("admission/v1", relative));
            if (digest(raw) !== subjectDigest) throw new Error(`${role}:${entry.kind} retained subject digest drift`);
            subjects.push({ kind: entry.kind, slug: entry.slug, role, path: relative, digest: subjectDigest, raw });
          };
          for (const entry of set.entries) {
            if (typeof entry.kind !== "string" || typeof entry.slug !== "string" || !/^sha256:[0-9a-f]{64}$/.test(entry.packageDigest) || typeof entry.releaseTag !== "string" || !/^sha256:[0-9a-f]{64}$/.test(entry.packageReleaseManifestDigest)) throw new Error("invalid standard admission package entry");
            packages.push({
              name: `Takoform Form Package ${entry.kind}`,
              SPDXID: `SPDXRef-FormPackage-${spdxID(entry.slug)}`,
              versionInfo: set.packageVersion,
              downloadLocation: `${repository}/releases/tag/${entry.releaseTag}`,
              filesAnalyzed: false,
              checksums: [{ algorithm: "SHA256", checksumValue: hexDigest(entry.packageDigest) }],
              licenseConcluded: "NOASSERTION", licenseDeclared: "NOASSERTION", copyrightText: "NOASSERTION",
            });
            const releaseManifestPath = safeRelativePath(entry.packageReleaseManifestPath);
            if (digestFile(path.join("admission/v1", releaseManifestPath)) !== entry.packageReleaseManifestDigest) throw new Error(`${entry.kind} package release manifest digest drift`);
            packageDependencies.push({
              name: `form-package:${entry.kind}`,
              uri: `${repository}/releases/tag/${entry.releaseTag}`,
              digest: { sha256: hexDigest(entry.packageReleaseManifestDigest) },
            });
            addSubject(entry, "package-index", entry.packageIndexPath, entry.packageDigest);
            addSubject(entry, "admission-evidence", entry.evidencePath, entry.evidenceDigest);
            addSubject(entry, "host-report", entry.hostReportPath, entry.hostReportDigest);
            addSubject(entry, "provider-report", entry.providerReportPath, entry.providerReportDigest);
          }
          addSubject({ kind: "provider", slug: "provider" }, "registry-readback", set.providerRegistryReadback.path, set.providerRegistryReadback.digest);
          if (new Set(packages.map(({ SPDXID }) => SPDXID)).size !== contract.provenance.packageCount || subjects.length !== contract.retainedSubjects.count || new Set(subjects.map(({ role, kind }) => `${role}:${kind}`)).size !== contract.retainedSubjects.count || new Set(subjects.map(({ path: subjectPath }) => subjectPath)).size !== contract.retainedSubjects.count) throw new Error("standard admission retained-subject closure is not exact");
          packages.sort((a, b) => a.SPDXID.localeCompare(b.SPDXID));
          subjects.sort((a, b) => a.path.localeCompare(b.path));
          packageDependencies.sort((a, b) => a.name.localeCompare(b.name));

          const files = subjects.map((subject) => ({
            fileName: `./v1/${subject.path}`,
            SPDXID: `SPDXRef-Retained-${spdxID(subject.role)}-${spdxID(subject.slug)}-${hexDigest(subject.digest).slice(0, 12)}`,
            checksums: [{ algorithm: "SHA256", checksumValue: hexDigest(subject.digest) }],
            licenseConcluded: "NOASSERTION", licenseInfoInFiles: ["NOASSERTION"], copyrightText: "NOASSERTION",
          }));
          if (new Set(files.map(({ SPDXID }) => SPDXID)).size !== files.length) throw new Error("duplicate retained-subject SPDX identifier");
          const verificationDigests = subjects.map(({ raw }) => crypto.createHash("sha1").update(raw).digest("hex")).sort();
          const verificationCode = crypto.createHash("sha1").update(verificationDigests.join(""), "utf8").digest("hex");
          const rootPackage = {
            name: "Takoform standard Form admission", SPDXID: "SPDXRef-Admission", versionInfo: version,
            downloadLocation: `${repository}/releases/tag/${tag}`, filesAnalyzed: true,
            packageVerificationCode: { packageVerificationCodeValue: verificationCode },
            licenseConcluded: "NOASSERTION", licenseDeclared: "NOASSERTION", copyrightText: "NOASSERTION",
          };
          const relationships = [{ spdxElementId: "SPDXRef-DOCUMENT", relationshipType: "DESCRIBES", relatedSpdxElement: rootPackage.SPDXID }];
          for (const pkg of packages) relationships.push({ spdxElementId: rootPackage.SPDXID, relationshipType: "DEPENDS_ON", relatedSpdxElement: pkg.SPDXID });
          for (const file of files) relationships.push({ spdxElementId: rootPackage.SPDXID, relationshipType: "CONTAINS", relatedSpdxElement: file.SPDXID });
          const sbom = {
            spdxVersion: "SPDX-2.3", dataLicense: "CC0-1.0", SPDXID: "SPDXRef-DOCUMENT",
            name: `Takoform standard Form admission ${version}`,
            documentNamespace: `https://forms.takoform.com/spdx/admission/${version}/${commit}`,
            creationInfo: { creators: ["Tool: standard-admission-release"], created: "1970-01-01T00:00:00Z" },
            packages: [rootPackage, ...packages], files, relationships,
          };
          fs.writeFileSync(path.join(out, `takoform-standard-admission_${version}_sbom.spdx.json`), `${JSON.stringify(sbom)}\n`);
          const sbomName = `takoform-standard-admission_${version}_sbom.spdx.json`;
          const outputSubjects = ["fresh-provider-lifecycle-matrix.json", "standard-admission-set.json", "standard-admission-set.sigstore.json", "takoform-standard-admission-v1.tar.gz", sbomName]
            .map((name) => ({ name, digest: { sha256: hexDigest(digestFile(path.join(out, name))) } }));
          const pinsPath = "admission/v1/trust/offline-sigstore-pins.json";
          const pinsDigest = digestFile(pinsPath);
          const subjectDependencies = subjects.map((subject) => ({
            name: `retained-subject:${subject.role}:${subject.kind}`,
            uri: `git+${repository}.git@${commit}#admission/v1/${subject.path}`,
            digest: { sha256: hexDigest(subject.digest) },
          }));
          const provenance = {
            _type: "https://in-toto.io/Statement/v1",
            subject: outputSubjects,
            predicateType: "https://slsa.dev/provenance/v1",
            predicate: { buildDefinition: {
              buildType: "https://forms.takoform.com/build/standard-admission/v1",
              externalParameters: { sourceCommit: commit, tag, version, admissionReleaseVersion: version, definitionVersion: set.definitionVersion, packageVersion: set.packageVersion, workflow: ".github/workflows/standard-admission-release.yml" },
              internalParameters: { canonicalization: "RFC8785", packageCount: contract.provenance.packageCount, retainedSubjectCount: contract.provenance.retainedSubjectCount, standardAdmissionSetDigest: digestFile("admission/v1/standard-admission-set.json"), offlineSigstorePinsDigest: pinsDigest },
              resolvedDependencies: [
                { name: "tagged-admission-source", uri: `git+${repository}.git`, digest: { gitCommit: commit } },
                { name: "protected-main-release-tooling", uri: `git+${repository}.git`, digest: { gitCommit: commit } },
                { name: "offline-sigstore-pins", uri: `git+${repository}.git@${commit}#${pinsPath}`, digest: { sha256: hexDigest(pinsDigest) } },
                ...packageDependencies, ...subjectDependencies,
              ],
            }, runDetails: { builder: { id: `${repository}/.github/workflows/standard-admission-release.yml@refs/heads/main` }, metadata: { invocationId: process.env.GITHUB_RUN_ID } } },
          };
          fs.writeFileSync(path.join(out, `takoform-standard-admission_${version}_provenance.intoto.json`), `${JSON.stringify(provenance)}\n`);
          NODE
          (cd "${output}" && sha256sum \
            fresh-provider-lifecycle-matrix.json \
            standard-admission-set.json \
            standard-admission-set.sigstore.json \
            takoform-standard-admission-v1.tar.gz \
            "takoform-standard-admission_${VERSION}_provenance.intoto.json" \
            "takoform-standard-admission_${VERSION}_sbom.spdx.json" > SHA256SUMS)

          OUTPUT="${output}" node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");
          const out = process.env.OUTPUT;
          const sha = (bytes) => `sha256:${crypto.createHash("sha256").update(bytes).digest("hex")}`;
          const files = fs.readdirSync(out).sort();
          const releaseAssets = files.map((name) => ({ name, digest: sha(fs.readFileSync(path.join(out, name))) }));
          const byName = new Map(releaseAssets.map((entry) => [entry.name, entry.digest]));
          const version = process.env.VERSION;
          const candidate = {
            kind: "takos.release-candidate-manifest@v1", surfaceId: "takoform-standard-form-admission",
            repository: "https://github.com/tako0614/terraform-provider-takoform.git", sourceCommit: process.env.SOURCE_COMMIT,
