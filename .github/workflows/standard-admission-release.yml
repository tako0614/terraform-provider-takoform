            kind: "takos.release-safety-adapter-result@v1", status: "promoted", surfaceId: "takoform-standard-form-admission",
            sourceCommit: process.env.SOURCE_COMMIT, controllerCommit: process.env.CONTROLLER_COMMIT,
            controllerDigest: process.env.CONTROLLER_DIGEST, adapterDigest: process.env.ADAPTER_DIGEST,
            artifactDigests: decode("ARTIFACT_DIGESTS_B64"), targetFingerprint: process.env.TARGET_FINGERPRINT,
            attestationDigest: `sha256:${crypto.createHash("sha256").update(fs.readFileSync("candidate/standard-admission-set.sigstore.json")).digest("hex")}`,
            releaseTag: process.env.RELEASE_TAG, releaseUrl: `https://github.com/tako0614/terraform-provider-takoform/releases/tag/${process.env.RELEASE_TAG}`,
            workflowRunId: process.env.GITHUB_RUN_ID, readbackAt: new Date().toISOString().replace(/\.\d{3}Z$/, ".000Z"),
            healthChecks: checks.map((check) => ({...check, status: "passed"})),
