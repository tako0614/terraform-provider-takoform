          for (const subject of expectedSubjects.values()) if (subjectDependencies.get(`${subject.role}:${subject.kind}`) !== subject.digest) process.exit(1);
          NODE
          cmp candidate/fresh-provider-lifecycle-matrix.json admission/v1/registry/provider-lifecycle-matrix.json
          tar -xOzf candidate/takoform-standard-admission-v1.tar.gz v1/registry/provider-lifecycle-matrix.json > "${RUNNER_TEMP}/promoted-archived-provider-lifecycle-matrix.json"
          cmp candidate/fresh-provider-lifecycle-matrix.json "${RUNNER_TEMP}/promoted-archived-provider-lifecycle-matrix.json"
