      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: takoform-standard-form-admission-candidate-${{ needs.validate.outputs.version }}-${{ needs.validate.outputs.source_commit_short }}
