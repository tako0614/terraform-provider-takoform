          tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object}")"
          jq -e --arg source "${SOURCE_COMMIT}" '.object.type == "commit" and .object.sha == $source and .verification.verified == true' <<<"${tag_json}" >/dev/null
          computed="$(RELEASE_TAG="${RELEASE_TAG}" node -e 'const c=require("node:crypto"); const sorted=(v)=>Array.isArray(v)?v.map(sorted):v&&typeof v==="object"?Object.fromEntries(Object.keys(v).sort().map(k=>[k,sorted(v[k])])):v; const t={release:{tag:process.env.RELEASE_TAG,url:`https://github.com/tako0614/terraform-provider-takoform/releases/tag/${process.env.RELEASE_TAG}`},ociImages:[]}; process.stdout.write(`sha256:${c.createHash("sha256").update(JSON.stringify(sorted(t))).digest("hex")}`)')"
