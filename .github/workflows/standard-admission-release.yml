            --certificate-identity "${identity}" --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          gh attestation verify candidate/standard-admission-set.json --repo "${GITHUB_REPOSITORY}"
          gh attestation verify candidate/takoform-standard-admission-v1.tar.gz --repo "${GITHUB_REPOSITORY}"
      - name: Preflight signed tag and deterministic target
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          TARGET_FINGERPRINT: ${{ inputs.target_fingerprint }}
        run: |
          set -euo pipefail
          ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}")"
          object="$(jq -er .object.sha <<<"${ref_json}")"
