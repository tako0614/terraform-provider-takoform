      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            ${{ steps.build.outputs.output }}/standard-admission-set.json
            ${{ steps.build.outputs.output }}/takoform-standard-admission-v1.tar.gz
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ steps.build.outputs.output }}/takoform-standard-admission-v1.tar.gz
