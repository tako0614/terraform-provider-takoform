          retention-days: 90

  promote:
    name: Publish the controller-authorized admission release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    if: inputs.phase == 'promote' && needs.validate.result == 'success'
    environment: standard-admission-release
    permissions:
      actions: read
      attestations: read
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false
      - name: Refuse stale or non-controller-authorized promotion
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PHASE: ${{ inputs.phase }}
          VERSION: ${{ inputs.version }}
          TAG: ${{ inputs.tag }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_MANIFEST_DIGEST: ${{ inputs.candidate_manifest_digest }}
          AUTHORIZATION_DIGEST: ${{ inputs.authorization_digest }}
          RELEASE_ID: ${{ inputs.release_id }}
          ENVELOPE_DIGEST: ${{ inputs.envelope_digest }}
          CONTROLLER_COMMIT: ${{ inputs.controller_commit }}
          CONTROLLER_DIGEST: ${{ inputs.controller_digest }}
          ADAPTER_DIGEST: ${{ inputs.adapter_digest }}
          AUTHORIZATION_SECRET_NAME: ${{ inputs.authorization_secret_name }}
          ARTIFACT_DIGESTS_B64: ${{ inputs.artifact_digests_b64 }}
          HEALTH_CHECKS_B64: ${{ inputs.health_checks_b64 }}
          TARGET_FINGERPRINT: ${{ inputs.target_fingerprint }}
          AUTHORIZATION_SECRET_JSON: ${{ secrets[inputs.authorization_secret_name] }}
        run: |
          set -euo pipefail
          test -n "${AUTHORIZATION_SECRET_JSON}"
          promotion_input_digest="$(node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const contract = JSON.parse(fs.readFileSync("release/standard-admission-promotion-input-contract.json", "utf8"));
          const canonical = (value) => Array.isArray(value) ? value.map(canonical) : value && typeof value === "object" ? Object.fromEntries(Object.keys(value).sort().map((key) => [key, canonical(value[key])])) : value;
          const inputs = {
            phase: process.env.PHASE,
            release_id: process.env.RELEASE_ID,
            version: process.env.VERSION,
            tag: process.env.TAG,
            source_commit: process.env.SOURCE_COMMIT,
            candidate_run_id: process.env.CANDIDATE_RUN_ID,
            candidate_manifest_digest: process.env.CANDIDATE_MANIFEST_DIGEST,
            envelope_digest: process.env.ENVELOPE_DIGEST,
            controller_commit: process.env.CONTROLLER_COMMIT,
            controller_digest: process.env.CONTROLLER_DIGEST,
            adapter_digest: process.env.ADAPTER_DIGEST,
            authorization_digest: process.env.AUTHORIZATION_DIGEST,
            authorization_secret_name: process.env.AUTHORIZATION_SECRET_NAME,
            artifact_digests_b64: process.env.ARTIFACT_DIGESTS_B64,
            health_checks_b64: process.env.HEALTH_CHECKS_B64,
            target_fingerprint: process.env.TARGET_FINGERPRINT,
          };
          if (contract.format !== "takoform.standard-admission-promotion-input-contract@v1" || JSON.stringify(Object.keys(inputs).sort()) !== JSON.stringify([...contract.keys].sort()) || Object.values(inputs).some((value) => typeof value !== "string" || value.length === 0)) process.exit(1);
          process.stdout.write(`sha256:${crypto.createHash("sha256").update(JSON.stringify(canonical(inputs))).digest("hex")}`);
          NODE
          )"
          jq -e --arg digest "${AUTHORIZATION_DIGEST}" --arg release_id "${RELEASE_ID}" --arg envelope "${ENVELOPE_DIGEST}" --arg promotion_input_digest "${promotion_input_digest}" '
            keys == ["authorizationDigest", "envelopeDigest", "expiresAt", "format", "promotionInputDigest", "releaseId"] and
            .format == "takos.release-safety-one-use-authorization@v1" and
            .authorizationDigest == $digest and .releaseId == $release_id and .envelopeDigest == $envelope and
            .promotionInputDigest == $promotion_input_digest and
            (.expiresAt | type == "string")
