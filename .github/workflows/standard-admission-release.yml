            if (digest !== asset.digest) process.exit(1);
          }
          const byName = new Map(candidate.releaseAssets.map(({ name, digest }) => [name, digest]));
          const sbomName = `takoform-standard-admission_${process.env.VERSION}_sbom.spdx.json`;
          const provenanceName = `takoform-standard-admission_${process.env.VERSION}_provenance.intoto.json`;
          const toolchainDigest = sha(Buffer.from("go1.26.5\ncosign-v3.0.6\nopentofu1.12.1\nterraform1.15.8\n", "utf8"));
          if (JSON.stringify(candidate.artifactDigests) !== JSON.stringify(candidate.releaseAssets.map(({ digest }) => digest)) || JSON.stringify(candidate.artifactDigests) !== JSON.stringify(decoded) || candidate.sbomDigests.length !== contract.candidateManifest.sbomDigestCount || JSON.stringify(candidate.sbomDigests) !== JSON.stringify([byName.get(sbomName)]) || candidate.provenanceDigests.length !== contract.candidateManifest.provenanceDigestCount || JSON.stringify(candidate.provenanceDigests) !== JSON.stringify([byName.get(provenanceName)]) || candidate.configDigest !== byName.get("standard-admission-set.json") || candidate.configDigest !== digestFile("admission/v1/standard-admission-set.json") || candidate.policyDigest !== digestFile("admission/v1/trust/offline-sigstore-pins.json") || candidate.toolchainDigest !== toolchainDigest) process.exit(1);

          const set = JSON.parse(fs.readFileSync("candidate/standard-admission-set.json", "utf8"));
          const stableVersion = /^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$/;
          if (set.format !== contract.standardAdmissionSet.format || !stableVersion.test(set.definitionVersion) || !stableVersion.test(set.packageVersion) || set.definitionVersion !== set.packageVersion || set.admissionReleaseTag !== process.env.RELEASE_TAG || !Array.isArray(set.entries) || set.entries.length !== contract.standardAdmissionSet.entryCount || JSON.stringify(set.entries.map(({ kind }) => kind)) !== JSON.stringify(contract.standardAdmissionSet.kinds)) process.exit(1);
          const expectedPackages = new Map();
          const expectedSubjects = new Map();
          const addSubject = (kind, role, subjectPath, digest) => {
            if (!/^sha256:[0-9a-f]{64}$/.test(digest) || expectedSubjects.has(subjectPath)) process.exit(1);
            expectedSubjects.set(subjectPath, { kind, role, digest });
