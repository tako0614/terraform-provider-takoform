name: Release provider

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: provider-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SYFT_VERSION: "1.48.0"
  SYFT_LINUX_AMD64_SHA256: "6cef9a7f37220d9067eaf9cfaaa2fce986e9f320a8d42cbc36658c99af78ea04"
  EXPECTED_GPG_FINGERPRINT: "3510E75E05BBCC303B92D77934FC18AC897FB709"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Check out the signed tag without write credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify the immutable signed source with the public key only
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" != "tag" || "$(jq -r .tag release/version.json)" != "$GITHUB_REF_NAME" ]]; then
            echo "Provider releases require the exact descriptor tag" >&2
            exit 1
          fi
          git show-ref --verify --quiet "refs/tags/$GITHUB_REF_NAME"
          test "$(git rev-list -n 1 "refs/tags/$GITHUB_REF_NAME")" = "$GITHUB_SHA"
          fingerprints="$(gpg --batch --with-colons --import-options show-only --import release/keys/provider-signing-key.asc | awk -F: '$1 == "fpr" { print $10 }')"
          test "$fingerprints" = "$EXPECTED_GPG_FINGERPRINT"
          gpg --batch --import release/keys/provider-signing-key.asc
          verification="$(git verify-tag --raw "$GITHUB_REF_NAME" 2>&1)"
          grep -F "[GNUPG:] VALIDSIG $EXPECTED_GPG_FINGERPRINT " <<<"$verification"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: |
            go.sum
            cmd/provider-release/go.sum

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # pinned: v2
        with:
          tofu_version: 1.12.1
          tofu_wrapper: false

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # pinned: v4.0.1
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Execute all candidate code in this read-only job
        shell: bash
        run: |
          set -euo pipefail
          go run ./cmd/provider-lifecycle-conformance matrix --opentofu tofu --terraform terraform
          go run ./cmd/standard-form-conformance candidate-publication-check
          go -C cmd/provider-release test ./...
          go run ./cmd/conformance verify
          go run ./cmd/migration-proof
          go -C cmd/provider-release run . verify-source --expected-trigger-tag "$GITHUB_REF_NAME"

      - name: Materialize exact Registry manifest asset
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p .release-tmp
          install -m 0644 terraform-registry-manifest.json \
            ".release-tmp/terraform-provider-takoform_${version}_manifest.json"

      - name: Install pinned Syft
        shell: bash
        run: |
          set -euo pipefail
          archive="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl --fail --silent --show-error --location \
            --output "$RUNNER_TEMP/$archive" \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/$archive"
          printf '%s  %s\n' "$SYFT_LINUX_AMD64_SHA256" "$RUNNER_TEMP/$archive" \
            | sha256sum --check --strict
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" syft
          mkdir -p "$RUNNER_TEMP/bin"
          install -m 0755 "$RUNNER_TEMP/syft" "$RUNNER_TEMP/bin/syft"
          printf '%s\n' "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Build first reproducibility snapshot
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean --skip=publish,sign

      - name: Capture first reproducibility snapshot
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/goreleaser-repro-1"
          cp dist/*.zip "$RUNNER_TEMP/goreleaser-repro-1/"

      - name: Perturb source mtime
        shell: bash
        run: touch -m -d '2040-01-02T03:04:05Z' LICENSE

      - name: Build second reproducibility snapshot
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean --skip=publish,sign

      - name: Verify GoReleaser archive reproducibility
        shell: bash
        run: |
          set -euo pipefail
          first="$RUNNER_TEMP/goreleaser-repro-1"
          mapfile -t names < <(find "$first" -maxdepth 1 -type f -name '*.zip' -printf '%f\n' | sort)
          if [[ "${#names[@]}" -ne 5 ]]; then
            echo "Expected five provider archives, got ${#names[@]}" >&2
            exit 1
          fi
          for name in "${names[@]}"; do
            test -f "dist/$name"
            test "$(sha256sum "$first/$name" | cut -d' ' -f1)" = "$(sha256sum "dist/$name" | cut -d' ' -f1)"
          done

      - name: Build final unsigned release inventory
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --skip=publish,sign

      - name: Close and export the unsigned inventory
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          output="$RUNNER_TEMP/provider-release"
          mkdir -p "$output"
          cp dist/*.zip dist/*.spdx.json "$output/"
          install -m 0644 ".release-tmp/terraform-provider-takoform_${version}_manifest.json" "$output/"
          mapfile -t archives < <(find "$output" -maxdepth 1 -type f -name '*.zip' -printf '%f\n' | sort)
          mapfile -t sboms < <(find "$output" -maxdepth 1 -type f -name '*.spdx.json' -printf '%f\n' | sort)
          test "${#archives[@]}" = "5"
          test "${#sboms[@]}" = "5"
          mapfile -t unsigned < <(find "$output" -maxdepth 1 -type f -printf '%f\n' | sort)
          test "${#unsigned[@]}" = "11"
          checksum="terraform-provider-takoform_${version}_SHA256SUMS"
          (cd "$output" && for name in "${unsigned[@]}"; do sha256sum "$name"; done > "$checksum")
          (cd "$output" && sha256sum --check --strict "$checksum")

      - name: Upload only the closed unsigned inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-provider-release-${{ github.sha }}
          path: ${{ runner.temp }}/provider-release
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: provider-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out exact signed-tag metadata without Git write credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download the read-only build inventory
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unsigned-provider-release-${{ github.sha }}
          path: ${{ runner.temp }}/provider-release

      - name: Statically verify the exact source and unsigned inventory
        id: inventory
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_TYPE" != "tag" || "$(jq -r .tag release/version.json)" != "$GITHUB_REF_NAME" ]]; then
            echo "Provider releases require the exact descriptor tag" >&2
            exit 1
          fi
          git show-ref --verify --quiet "refs/tags/$GITHUB_REF_NAME"
          test "$(git rev-list -n 1 "refs/tags/$GITHUB_REF_NAME")" = "$GITHUB_SHA"
          fingerprints="$(gpg --batch --with-colons --import-options show-only --import release/keys/provider-signing-key.asc | awk -F: '$1 == "fpr" { print $10 }')"
          test "$fingerprints" = "$EXPECTED_GPG_FINGERPRINT"
          gpg --batch --import release/keys/provider-signing-key.asc
          verification="$(git verify-tag --raw "$GITHUB_REF_NAME" 2>&1)"
          grep -F "[GNUPG:] VALIDSIG $EXPECTED_GPG_FINGERPRINT " <<<"$verification"
          version="${GITHUB_REF_NAME#v}"
          output="$RUNNER_TEMP/provider-release"
          checksum="$output/terraform-provider-takoform_${version}_SHA256SUMS"
          manifest="$output/terraform-provider-takoform_${version}_manifest.json"
          test -f "$checksum"
          test -f "$manifest"
          mapfile -t archives < <(find "$output" -maxdepth 1 -type f -name '*.zip' -printf '%f\n' | sort)
          mapfile -t sboms < <(find "$output" -maxdepth 1 -type f -name '*.spdx.json' -printf '%f\n' | sort)
          test "${#archives[@]}" = "5"
          test "${#sboms[@]}" = "5"
          mapfile -t actual < <(find "$output" -maxdepth 1 -type f -printf '%f\n' | sort)
          test "${#actual[@]}" = "12"
          (cd "$output" && sha256sum --check --strict "$(basename "$checksum")")
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "A GitHub release already owns $GITHUB_REF_NAME; refusing overwrite" >&2
            exit 1
          fi
          registry_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            "https://registry.terraform.io/v1/providers/tako0614/takoform/$version/download/linux/amd64")"
          if [[ "$registry_status" != "404" ]]; then
            echo "Terraform Registry version preflight expected 404, got $registry_status; refusing overwrite" >&2
            exit 1
          fi
          {
            echo "output=$output"
            echo "checksum=$checksum"
          } >> "$GITHUB_OUTPUT"

      - name: Import provider signing key only after static verification
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Sign the exact closed checksum inventory
        shell: bash
        env:
          IMPORTED_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
        run: |
          set -euo pipefail
          if [[ "$IMPORTED_FINGERPRINT" != "$EXPECTED_GPG_FINGERPRINT" ]]; then
            echo "Imported signing key fingerprint does not match the pinned provider signer" >&2
            exit 1
          fi
          checksum="${{ steps.inventory.outputs.checksum }}"
          signature="${checksum}.sig"
          test ! -e "$signature"
          gpg --batch --local-user "$EXPECTED_GPG_FINGERPRINT" --output "$signature" --detach-sign "$checksum"
          gpg --batch --verify "$signature" "$checksum"

      - name: Create this run's provider release draft
        id: draft
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi
          response="$(gh api --method POST "repos/$GITHUB_REPOSITORY/releases" \
            -f tag_name="$GITHUB_REF_NAME" -f name="$GITHUB_REF_NAME" -F draft=true -F prerelease="$prerelease" \
            -f body='Signed deterministic Takoform provider release candidate. Provider publication does not activate Standard Forms.')"
          release_id="$(jq -r .id <<<"$response")"
          test "$release_id" != "null"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

      - name: Upload and verify the exact provider release inventory
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.draft.outputs.release_id }}
        run: |
          set -euo pipefail
          output="${{ steps.inventory.outputs.output }}"
          while IFS= read -r asset; do
            gh release upload "$GITHUB_REF_NAME" "$asset"
          done < <(find "$output" -maxdepth 1 -type f -print | sort)
          find "$output" -maxdepth 1 -type f -printf '%f\n' | sort > "$RUNNER_TEMP/expected-assets.txt"
          gh api --paginate "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" --jq '.[].name' | sort > "$RUNNER_TEMP/actual-assets.txt"
          diff -u "$RUNNER_TEMP/expected-assets.txt" "$RUNNER_TEMP/actual-assets.txt"
          test "$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq .draft)" = "true"

      - name: Attest released provider assets
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: ${{ steps.inventory.outputs.output }}/*

      - name: Publish verified provider release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.draft.outputs.release_id }}
        run: |
          set -euo pipefail
          finalized="$(gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -F draft=false)"
          test "$(jq -r .draft <<<"$finalized")" = "false"

      - name: Remove partial draft after failure
        if: ${{ always() && !success() }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.draft.outputs.release_id }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_ID" ]]; then
            exit 0
          fi
          release_json="$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" 2>/dev/null || true)"
          if [[ -n "$release_json" && "$(jq -r .draft <<<"$release_json")" == "true" && "$(jq -r .tag_name <<<"$release_json")" == "$GITHUB_REF_NAME" ]]; then
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID"
          fi
