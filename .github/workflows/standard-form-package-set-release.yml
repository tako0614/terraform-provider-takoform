name: Release coordinated standard Form Package set

on:
  workflow_dispatch:
    inputs:
      phase:
        description: Build one closed candidate or promote its exact bytes
        required: true
        default: candidate
        type: choice
        options:
          - candidate
          - promote
      version:
        description: Exact standard Form Package set version
        required: true
        type: string
      release_id:
        description: Private-envelope release identifier (promote only)
        required: false
        default: ""
        type: string
      tag:
        description: Exact signed annotated root set tag (promote only)
        required: false
        default: ""
        type: string
      source_commit:
        description: Exact reviewed source commit (promote only)
        required: false
        default: ""
        type: string
      candidate_run_id:
        description: Successful closed candidate workflow run id (promote only)
        required: false
        default: ""
        type: string
      candidate_manifest_digest:
        description: SHA-256 of release-candidate-manifest.json (promote only)
        required: false
        default: ""
        type: string
      envelope_digest:
        description: SHA-256 of the operator-private release envelope
        required: false
        default: ""
        type: string
      controller_commit:
        description: Pinned ecosystem release-safety controller commit
        required: false
        default: ""
        type: string
      controller_digest:
        description: Pinned ecosystem release-safety controller digest
        required: false
        default: ""
        type: string
      adapter_digest:
        description: Pinned fixed-adapter SHA-256 digest
        required: false
        default: ""
        type: string
      authorization_digest:
        description: Controller technical-authorization evidence digest
        required: false
        default: ""
        type: string
      artifact_digests_b64:
        description: Base64url ordered envelope artifact digest JSON
        required: false
        default: ""
        type: string
      health_checks_b64:
        description: Base64url required envelope health-check JSON
        required: false
        default: ""
        type: string
      target_fingerprint:
        description: Expected deterministic active-root target fingerprint
        required: false
        default: ""
        type: string

run-name: ${{ inputs.phase == 'promote' && format('release-safety:standard-form-package-set:{0}:{1}', inputs.release_id, inputs.envelope_digest) || format('standard-form-package-set-candidate:{0}:{1}', inputs.version, github.sha) }}

concurrency:
  group: standard-form-package-set-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  EXPECTED_COSIGN_VERSION: "v3.0.6"
  RELEASE_SAFETY_CONTROLLER_COMMIT: "5ca8b7c3eb25b8e915b6bfb39534da278cc0aef2"
  RELEASE_SAFETY_ADAPTER_DIGEST: "sha256:f7e78f3603b42302c0c3a32c0ec087fec9124cd42b6df330f590c503b61c183f"

jobs:
  validate:
    name: Validate source tag and release-safety bindings
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.source.outputs.version }}
      tag: ${{ steps.source.outputs.tag }}
      source_commit: ${{ steps.source.outputs.source_commit }}
      source_commit_short: ${{ steps.source.outputs.source_commit_short }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate exact tagged source and fixed controller authority
        id: source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PHASE: ${{ inputs.phase }}
          VERSION: ${{ inputs.version }}
          REQUESTED_RELEASE_ID: ${{ inputs.release_id }}
          REQUESTED_TAG: ${{ inputs.tag }}
          REQUESTED_SOURCE_COMMIT: ${{ inputs.source_commit }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_MANIFEST_DIGEST: ${{ inputs.candidate_manifest_digest }}
          ENVELOPE_DIGEST: ${{ inputs.envelope_digest }}
          CONTROLLER_COMMIT: ${{ inputs.controller_commit }}
          CONTROLLER_DIGEST: ${{ inputs.controller_digest }}
          ADAPTER_DIGEST: ${{ inputs.adapter_digest }}
          AUTHORIZATION_DIGEST: ${{ inputs.authorization_digest }}
          ARTIFACT_DIGESTS_B64: ${{ inputs.artifact_digests_b64 }}
          HEALTH_CHECKS_B64: ${{ inputs.health_checks_b64 }}
          TARGET_FINGERPRINT: ${{ inputs.target_fingerprint }}
        run: |
          set -euo pipefail
          test "${GITHUB_RUN_ATTEMPT}" = "1" || {
            echo "Release runs are immutable; dispatch a new release attempt." >&2
            exit 1
          }
          test "${VERSION}" = "1.0.1"
          release_tag="standard-forms/v${VERSION}"
          test "${GITHUB_REF}" = "refs/tags/${release_tag}"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          if [[ -n "${REQUESTED_TAG}" && "${REQUESTED_TAG}" != "${release_tag}" ]]; then
            echo "Requested tag differs from the root set tag." >&2
            exit 1
          fi
          if [[ -n "${REQUESTED_SOURCE_COMMIT}" && "${REQUESTED_SOURCE_COMMIT}" != "${GITHUB_SHA}" ]]; then
            echo "Requested source commit differs from the tagged workflow commit." >&2
            exit 1
          fi
          ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${release_tag}")"
          tag_object_sha="$(jq -er '.object.sha' <<<"${ref_json}")"
          jq -e '.object.type == "tag"' <<<"${ref_json}" >/dev/null
          tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
          jq -e --arg source "${GITHUB_SHA}" '.object.type == "commit" and .object.sha == $source and .verification.verified == true' <<<"${tag_json}" >/dev/null

          if [[ "${PHASE}" == "candidate" ]]; then
            for value in REQUESTED_RELEASE_ID REQUESTED_TAG REQUESTED_SOURCE_COMMIT CANDIDATE_RUN_ID CANDIDATE_MANIFEST_DIGEST ENVELOPE_DIGEST CONTROLLER_COMMIT CONTROLLER_DIGEST ADAPTER_DIGEST AUTHORIZATION_DIGEST ARTIFACT_DIGESTS_B64 HEALTH_CHECKS_B64 TARGET_FINGERPRINT; do
              if [[ -n "${!value}" ]]; then
                echo "${value} is promotion-only and must be empty for a candidate." >&2
                exit 1
              fi
            done
            if gh release view "${release_tag}" >/dev/null 2>&1; then
              echo "The active root set release already exists; never rebuild or replace it." >&2
              exit 1
            fi
          elif [[ "${PHASE}" == "promote" ]]; then
            for value in REQUESTED_RELEASE_ID REQUESTED_TAG REQUESTED_SOURCE_COMMIT CANDIDATE_RUN_ID CANDIDATE_MANIFEST_DIGEST ENVELOPE_DIGEST CONTROLLER_COMMIT CONTROLLER_DIGEST ADAPTER_DIGEST AUTHORIZATION_DIGEST ARTIFACT_DIGESTS_B64 HEALTH_CHECKS_B64 TARGET_FINGERPRINT; do
              if [[ -z "${!value}" ]]; then
                echo "${value} is required for promotion." >&2
                exit 1
              fi
            done
            [[ "${CANDIDATE_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
            [[ "${CONTROLLER_COMMIT}" =~ ^[0-9a-f]{40}$ ]]
            for value in "${CANDIDATE_MANIFEST_DIGEST}" "${ENVELOPE_DIGEST}" "${CONTROLLER_DIGEST}" "${ADAPTER_DIGEST}" "${AUTHORIZATION_DIGEST}" "${TARGET_FINGERPRINT}"; do
              [[ "${value}" =~ ^sha256:[0-9a-f]{64}$ ]]
            done
            test "${CONTROLLER_COMMIT}" = "${RELEASE_SAFETY_CONTROLLER_COMMIT}"
            test "${ADAPTER_DIGEST}" = "${RELEASE_SAFETY_ADAPTER_DIGEST}"
          else
            echo "Unsupported release phase: ${PHASE}" >&2
            exit 1
          fi
          {
            echo "version=${VERSION}"
            echo "tag=${release_tag}"
            echo "source_commit=${GITHUB_SHA}"
            echo "source_commit_short=${GITHUB_SHA:0:12}"
          } >> "${GITHUB_OUTPUT}"

  candidate:
    name: Build, sign, attest, and close all ten packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    if: inputs.phase == 'candidate' && needs.validate.result == 'success'
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate.outputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # pinned: v2
        with:
          tofu_version: 1.12.1
          tofu_wrapper: false

      - name: Install pinned Cosign v3
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2, Cosign v3.0.6

      - name: Run source, structural, and materializability gates
        run: |
          set -euo pipefail
          go mod verify
          go test ./...
          go vet ./...
          go run ./cmd/conformance verify
          go run ./cmd/form-package conformance
          go run ./cmd/standard-form-conformance verify
          go run ./cmd/standard-form-conformance candidate-publication-check
          go run ./cmd/standard-form-conformance published-package-check
          go run ./cmd/standard-form-conformance materializability-check
          tofu fmt -check -recursive examples

      - name: Build and keyless-sign the exact ten package inventories
        id: packages
        shell: bash
        env:
          SOURCE_COMMIT: ${{ needs.validate.outputs.source_commit }}
          VERSION: ${{ needs.validate.outputs.version }}
          ROOT_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          grep -F "${EXPECTED_COSIGN_VERSION}" <<<"$(cosign version 2>&1)"
          package_root="${RUNNER_TEMP}/standard-form-packages"
          mkdir -p "${package_root}"
          release_ids=(
            k-ivsgozkxn5zgwzls
            k-j5rguzldorbhky3lmv2a
            k-jnlfg5dpojsq
            k-kniuyrdborqweyltmu
            k-kf2wk5lf
            k-kzswg5dpojew4zdfpa
            k-ir2xeylcnrsvo33snntgy33x
            k-inxw45dbnfxgk4stmvzhm2ldmu
            k-kn2gc5dfmz2wyqldorxxettbnvsxg4dbmnsq
            k-knrwqzleovwgk
          )
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/standard-form-package-set-release.yml@refs/tags/${ROOT_TAG}"
          for release_id in "${release_ids[@]}"; do
            package_tag="forms/${release_id}/v${VERSION}"
            test "$(git rev-list -n 1 "${package_tag}")" = "${SOURCE_COMMIT}"
            output="${package_root}/${release_id}"
            go run ./cmd/form-package-release build-package \
              --repo "${GITHUB_WORKSPACE}" --tag "${package_tag}" \
              --tooling-commit "${SOURCE_COMMIT}" --output "${output}" \
              --coordinated-standard-set
            subject="$(jq -er .signedSubject "${output}/release-manifest.json")"
            bundle="$(jq -er .signatureBundle "${output}/release-manifest.json")"
            test "$(jq -er .publisherPolicy.identity "${output}/release-manifest.json")" = "${identity}"
            cosign sign-blob "${output}/${subject}" --bundle "${output}/${bundle}" --yes
            cosign verify-blob "${output}/${subject}" \
              --bundle "${output}/${bundle}" \
              --certificate-identity "${identity}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
            go run ./cmd/form-package-release finalize-bundle --output "${output}"
            (cd "${output}" && sha256sum --check --strict SHA256SUMS)
          done
          echo "root=${package_root}" >> "${GITHUB_OUTPUT}"

      - name: Build and keyless-sign the root activation manifest
        id: set
        shell: bash
        env:
          SOURCE_COMMIT: ${{ needs.validate.outputs.source_commit }}
          VERSION: ${{ needs.validate.outputs.version }}
          ROOT_TAG: ${{ needs.validate.outputs.tag }}
          PACKAGES_ROOT: ${{ steps.packages.outputs.root }}
        run: |
          set -euo pipefail
          output="${RUNNER_TEMP}/standard-form-package-set-candidate"
          go run ./cmd/form-package-release build-standard-set \
            --repo "${GITHUB_WORKSPACE}" --tag "${ROOT_TAG}" \
            --packages-root "${PACKAGES_ROOT}" --output "${output}" \
            --tooling-commit "${SOURCE_COMMIT}"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/standard-form-package-set-release.yml@refs/tags/${ROOT_TAG}"
          cosign sign-blob "${output}/standard-form-package-set.json" \
            --bundle "${output}/standard-form-package-set.sigstore.json" --yes
          cosign verify-blob "${output}/standard-form-package-set.json" \
            --bundle "${output}/standard-form-package-set.sigstore.json" \
            --certificate-identity "${identity}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          go run ./cmd/form-package-release finalize-standard-set \
            --output "${output}" --workflow-run-id "${GITHUB_RUN_ID}" --built-at "${built_at}"
          (cd "${output}" && sha256sum --check --strict SHA256SUMS)
          echo "output=${output}" >> "${GITHUB_OUTPUT}"

      - name: Attest every package and root signed subject
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            ${{ steps.packages.outputs.root }}/*/*_package-index.json
            ${{ steps.set.outputs.output }}/standard-form-package-set.json
            ${{ steps.set.outputs.output }}/takoform-standard-forms_1.0.1.tar.gz

      - name: Attest root set SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ${{ steps.set.outputs.output }}/takoform-standard-forms_1.0.1.tar.gz
          sbom-path: ${{ steps.set.outputs.output }}/takoform-standard-forms_1.0.1_sbom.spdx.json

      - name: Upload the closed all-or-nothing candidate without publishing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: takoform-standard-form-package-set-candidate-${{ needs.validate.outputs.version }}-${{ needs.validate.outputs.source_commit_short }}
          path: ${{ steps.set.outputs.output }}/
          if-no-files-found: error
          retention-days: 90

  promote:
    name: Resume exact package publication and activate root last
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: validate
    if: inputs.phase == 'promote' && needs.validate.result == 'success'
    environment: standard-form-package-set-release
    permissions:
      actions: read
      contents: write
    steps:
      - name: Refuse stale or non-controller-authorized promotion
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          AUTHORIZATION_DIGEST: ${{ inputs.authorization_digest }}
          EXPECTED_AUTHORIZATION_DIGEST: ${{ secrets.RELEASE_SAFETY_AUTHORIZATION_DIGEST }}
        run: |
          set -euo pipefail
          [[ "${EXPECTED_AUTHORIZATION_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
          test "${AUTHORIZATION_DIGEST}" = "${EXPECTED_AUTHORIZATION_DIGEST}"
          created_at="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq .created_at)"
          age_seconds="$(($(date -u +%s) - $(date -u -d "${created_at}" +%s)))"
          if (( age_seconds < 0 || age_seconds > 300 )); then
            echo "Promotion missed the five-minute controller dispatch window." >&2
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      - name: Install pinned Cosign v3 for independent readback
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2, Cosign v3.0.6

      - name: Verify candidate workflow authority
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          set -euo pipefail
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CANDIDATE_RUN_ID}")"
          jq -e --arg source "${SOURCE_COMMIT}" \
            '.head_sha == $source and .event == "workflow_dispatch" and .status == "completed" and
             .conclusion == "success" and .run_attempt == 1 and
             (.path | endswith("/.github/workflows/standard-form-package-set-release.yml") or . == ".github/workflows/standard-form-package-set-release.yml")' \
            <<<"${run_json}" >/dev/null

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: takoform-standard-form-package-set-candidate-${{ inputs.version }}-${{ needs.validate.outputs.source_commit_short }}
          path: candidate
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_run_id }}

      - name: Verify envelope bindings and every candidate byte
        shell: bash
        env:
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          CANDIDATE_MANIFEST_DIGEST: ${{ inputs.candidate_manifest_digest }}
          ARTIFACT_DIGESTS_B64: ${{ inputs.artifact_digests_b64 }}
        run: |
          set -euo pipefail
          go run ./cmd/form-package-release verify-standard-set-candidate \
            --source-commit "${SOURCE_COMMIT}" --workflow-run-id "${CANDIDATE_RUN_ID}" \
            --manifest-digest "${CANDIDATE_MANIFEST_DIGEST}" \
            --artifact-digests-b64 "${ARTIFACT_DIGESTS_B64}" \
            --output "${GITHUB_WORKSPACE}/candidate"
          mkdir "${RUNNER_TEMP}/standard-packages"
          tar -xzf "candidate/takoform-standard-forms_${{ inputs.version }}.tar.gz" -C "${RUNNER_TEMP}/standard-packages" --strip-components=1

      - name: Verify root Sigstore identity and GitHub attestation before mutation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ROOT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          grep -F "${EXPECTED_COSIGN_VERSION}" <<<"$(cosign version 2>&1)"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/standard-form-package-set-release.yml@refs/tags/${ROOT_TAG}"
          cosign verify-blob candidate/standard-form-package-set.json \
            --bundle candidate/standard-form-package-set.sigstore.json \
            --certificate-identity "${identity}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          gh attestation verify candidate/standard-form-package-set.json --repo "${GITHUB_REPOSITORY}"

      - name: Preflight repository immutability, protected tags, and deterministic target
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RULESET_AUDIT_TOKEN: ${{ secrets.RELEASE_SAFETY_RULESET_AUDIT_TOKEN }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          ROOT_TAG: ${{ inputs.tag }}
          TARGET_FINGERPRINT: ${{ inputs.target_fingerprint }}
        run: |
          set -euo pipefail
          test -n "${RULESET_AUDIT_TOKEN}"
          test "$(GH_TOKEN="${RULESET_AUDIT_TOKEN}" gh api "repos/${GITHUB_REPOSITORY}/immutable-releases" --jq .enabled)" = "true"
          rulesets="$(GH_TOKEN="${RULESET_AUDIT_TOKEN}" gh api "repos/${GITHUB_REPOSITORY}/rulesets?targets=tag")"
          verify_ruleset() {
            local name="$1" include="$2" id rule
            id="$(jq -er --arg name "${name}" '[.[] | select(.name == $name and .target == "tag" and .enforcement == "active")] | if length == 1 then .[0].id else error("one exact active tag ruleset is required") end' <<<"${rulesets}")"
            rule="$(GH_TOKEN="${RULESET_AUDIT_TOKEN}" gh api "repos/${GITHUB_REPOSITORY}/rulesets/${id}")"
            jq -e --arg include "${include}" '.target == "tag" and .enforcement == "active" and .bypass_actors == [] and .conditions.ref_name.include == [$include] and .conditions.ref_name.exclude == [] and ([.rules[].type] | sort) == ["deletion", "update"]' <<<"${rule}" >/dev/null
          }
          verify_ruleset standard-form-package-set-release-tags 'refs/tags/standard-forms/v*'
          verify_ruleset form-package-release-tags 'refs/tags/forms/k-*/v*'

          verify_signed_tag() {
            local tag="$1" ref_json object tag_json
            ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}")"
            object="$(jq -er '.object.sha' <<<"${ref_json}")"
            jq -e '.object.type == "tag"' <<<"${ref_json}" >/dev/null
            tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${object}")"
            jq -e --arg source "${SOURCE_COMMIT}" '.object.type == "commit" and .object.sha == $source and .verification.verified == true' <<<"${tag_json}" >/dev/null
          }
          verify_signed_tag "${ROOT_TAG}"
          while IFS= read -r tag; do verify_signed_tag "${tag}"; done < <(jq -r '.packages[].tag' candidate/standard-form-package-set.json)

          computed="$(ROOT_TAG="${ROOT_TAG}" node -e '
            const crypto = require("node:crypto");
            const sorted = (value) => Array.isArray(value) ? value.map(sorted) : value && typeof value === "object" ? Object.fromEntries(Object.keys(value).sort().map((key) => [key, sorted(value[key])])) : value;
            const target = { release: { tag: process.env.ROOT_TAG, url: `https://github.com/tako0614/terraform-provider-takoform/releases/tag/${process.env.ROOT_TAG}` }, ociImages: [] };
            process.stdout.write(`sha256:${crypto.createHash("sha256").update(JSON.stringify(sorted(target))).digest("hex")}`);
          ')"
          test "${computed}" = "${TARGET_FINGERPRINT}"
          if gh release view "${ROOT_TAG}" >/dev/null 2>&1; then
            echo "The active root release already exists; the controller must use retained readback." >&2
            exit 1
          fi

      - name: Publish or resume each exact immutable package release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ROOT_TAG: ${{ inputs.tag }}
          PACKAGES_ROOT: ${{ runner.temp }}/standard-packages
        run: |
          set -euo pipefail
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/standard-form-package-set-release.yml@refs/tags/${ROOT_TAG}"
          verify_inventory() {
            local tag="$1" entry="$2" source_dir="$3" require_stable="$4" release actual expected readback_dir
            release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}")"
            if [[ "${require_stable}" = true ]]; then
              jq -e --arg tag "${tag}" '.tag_name == $tag and .draft == false and .prerelease == false and .immutable == true' <<<"${release}" >/dev/null
            else
              jq -e --arg tag "${tag}" '.tag_name == $tag and .draft == true and .prerelease == false' <<<"${release}" >/dev/null
            fi
            expected="$(jq -r '.assets[].name' <<<"${entry}" | sort)"
            actual="$(jq -r '.assets[].name' <<<"${release}" | sort)"
            diff -u <(printf '%s\n' "${expected}") <(printf '%s\n' "${actual}")
            readback_dir="$(mktemp -d)"
            while IFS=$'\t' read -r name digest; do
              url="$(jq -er --arg name "${name}" '.assets[] | select(.name == $name) | .url' <<<"${release}")"
              gh api "${url}" --header 'Accept: application/octet-stream' > "${readback_dir}/${name}"
              test "sha256:$(sha256sum "${readback_dir}/${name}" | cut -d' ' -f1)" = "${digest}"
              cmp -s "${source_dir}/${name}" "${readback_dir}/${name}"
            done < <(jq -r '.assets[] | [.name, .digest] | @tsv' <<<"${entry}")
            subject="$(jq -er .signedSubject "${readback_dir}/release-manifest.json")"
            bundle="$(jq -er .signatureBundle "${readback_dir}/release-manifest.json")"
            cosign verify-blob "${readback_dir}/${subject}" --bundle "${readback_dir}/${bundle}" \
              --certificate-identity "${identity}" --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
            gh attestation verify "${readback_dir}/${subject}" --repo "${GITHUB_REPOSITORY}"
          }

          while IFS= read -r entry; do
            tag="$(jq -er .tag <<<"${entry}")"
            release_id="$(jq -er .releaseId <<<"${entry}")"
            source_dir="${PACKAGES_ROOT}/${release_id}"
            release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" 2>/dev/null || true)"
            if [[ -z "${release}" ]]; then
              release="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
                -f tag_name="${tag}" -f name="${tag}" -F draft=true -F prerelease=false \
                -f body='Data-only Takoform Form Package. It is not part of the active standard set until the immutable root set manifest release exists.')"
            fi
            if [[ "$(jq -r .draft <<<"${release}")" == true ]]; then
              while IFS= read -r actual_name; do
                jq -e --arg name "${actual_name}" '.assets[] | select(.name == $name)' <<<"${entry}" >/dev/null
              done < <(jq -r '.assets[].name' <<<"${release}")
              while IFS=$'\t' read -r name digest; do
                existing="$(jq -r --arg name "${name}" '[.assets[] | select(.name == $name)] | length' <<<"${release}")"
                if [[ "${existing}" = 0 ]]; then
                  gh release upload "${tag}" "${source_dir}/${name}"
                elif [[ "${existing}" = 1 ]]; then
                  url="$(jq -er --arg name "${name}" '.assets[] | select(.name == $name) | .url' <<<"${release}")"
                  temp="$(mktemp)"
                  gh api "${url}" --header 'Accept: application/octet-stream' > "${temp}"
                  test "sha256:$(sha256sum "${temp}" | cut -d' ' -f1)" = "${digest}"
                  cmp -s "${source_dir}/${name}" "${temp}"
                else
                  echo "Duplicate draft asset ${name} for ${tag}." >&2
                  exit 1
                fi
              done < <(jq -r '.assets[] | [.name, .digest] | @tsv' <<<"${entry}")
              verify_inventory "${tag}" "${entry}" "${source_dir}" false
              release_id_api="$(jq -er .id <<<"${release}")"
              gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id_api}" -F draft=false >/dev/null
            fi
            verify_inventory "${tag}" "${entry}" "${source_dir}" true
          done < <(jq -c '.packages[]' candidate/standard-form-package-set.json)

      - name: Seal the envelope-bound root readback
        shell: bash
        env:
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          CONTROLLER_COMMIT: ${{ inputs.controller_commit }}
          CONTROLLER_DIGEST: ${{ inputs.controller_digest }}
          ADAPTER_DIGEST: ${{ inputs.adapter_digest }}
          ARTIFACT_DIGESTS_B64: ${{ inputs.artifact_digests_b64 }}
          HEALTH_CHECKS_B64: ${{ inputs.health_checks_b64 }}
          TARGET_FINGERPRINT: ${{ inputs.target_fingerprint }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          attestation_digest="sha256:$(sha256sum candidate/standard-form-package-set.sigstore.json | cut -d' ' -f1)"
          readback_at="$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          go run ./cmd/form-package-release build-standard-set-readback \
            --source-commit "${SOURCE_COMMIT}" --controller-commit "${CONTROLLER_COMMIT}" \
            --controller-digest "${CONTROLLER_DIGEST}" --adapter-digest "${ADAPTER_DIGEST}" \
            --artifact-digests-b64 "${ARTIFACT_DIGESTS_B64}" --health-checks-b64 "${HEALTH_CHECKS_B64}" \
            --target-fingerprint "${TARGET_FINGERPRINT}" --attestation-digest "${attestation_digest}" \
            --workflow-run-id "${GITHUB_RUN_ID}" --readback-at "${readback_at}" --version "${VERSION}" \
            --output "${GITHUB_WORKSPACE}/release-safety-readback.json"

      - name: Publish the active root set release last
        id: root_release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ROOT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${ROOT_TAG}" 2>/dev/null || true)"
          if [[ -z "${release}" ]]; then
            release="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="${ROOT_TAG}" -f name="${ROOT_TAG}" -F draft=true -F prerelease=false \
              -f body='Active Takoform standard Form Package set. This root release is the sole activation authority for the exact ten immutable package releases listed in standard-form-package-set.json.')"
          fi
          jq -e --arg tag "${ROOT_TAG}" '.tag_name == $tag and .draft == true and .prerelease == false' <<<"${release}" >/dev/null
          echo "release_id=$(jq -er .id <<<"${release}")" >> "${GITHUB_OUTPUT}"
          if [[ "$(jq -r '.assets | length' <<<"${release}")" != 0 ]]; then
            echo "A resumed root draft must be empty; root drafts are removed on failure." >&2
            exit 1
          fi
          while IFS= read -r name; do gh release upload "${ROOT_TAG}" "candidate/${name}"; done < <(jq -r '.releaseAssets[].name' candidate/release-candidate-manifest.json)
          gh release upload "${ROOT_TAG}" release-safety-readback.json
          expected="$(mktemp)"
          jq -r '.releaseAssets[].name' candidate/release-candidate-manifest.json > "${expected}"
          echo release-safety-readback.json >> "${expected}"
          sort -o "${expected}" "${expected}"
          actual="$(mktemp)"
          gh api --paginate "repos/${GITHUB_REPOSITORY}/releases/$(jq -er .id <<<"${release}")/assets" --jq '.[].name' | sort > "${actual}"
          diff -u "${expected}" "${actual}"
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/$(jq -er .id <<<"${release}")" -F draft=false >/dev/null

      - name: Read back the immutable active root and exact ten-package closure
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ROOT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${ROOT_TAG}")"
          jq -e --arg tag "${ROOT_TAG}" '.tag_name == $tag and .draft == false and .prerelease == false and .immutable == true' <<<"${release}" >/dev/null
          expected="$(mktemp)"
          jq -r '.releaseAssets[].name' candidate/release-candidate-manifest.json > "${expected}"
          echo release-safety-readback.json >> "${expected}"
          sort -o "${expected}" "${expected}"
          actual="$(mktemp)"
          jq -r '.assets[].name' <<<"${release}" | sort > "${actual}"
          diff -u "${expected}" "${actual}"
          readback="$(mktemp -d)"
          while IFS=$'\t' read -r name digest; do
            url="$(jq -er --arg name "${name}" '.assets[] | select(.name == $name) | .url' <<<"${release}")"
            gh api "${url}" --header 'Accept: application/octet-stream' > "${readback}/${name}"
            test "sha256:$(sha256sum "${readback}/${name}" | cut -d' ' -f1)" = "${digest}"
          done < <(jq -r '.releaseAssets[] | [.name, .digest] | @tsv' candidate/release-candidate-manifest.json)
          readback_url="$(jq -er '.assets[] | select(.name == "release-safety-readback.json") | .url' <<<"${release}")"
          gh api "${readback_url}" --header 'Accept: application/octet-stream' > "${readback}/release-safety-readback.json"
          cmp -s release-safety-readback.json "${readback}/release-safety-readback.json"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/standard-form-package-set-release.yml@refs/tags/${ROOT_TAG}"
          cosign verify-blob "${readback}/standard-form-package-set.json" \
            --bundle "${readback}/standard-form-package-set.sigstore.json" \
            --certificate-identity "${identity}" --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          gh attestation verify "${readback}/standard-form-package-set.json" --repo "${GITHUB_REPOSITORY}"

      - name: Remove only a non-active partial root draft after failure
        if: ${{ always() && !success() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.root_release.outputs.release_id }}
          ROOT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_ID}" ]]; then exit 0; fi
          release="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" 2>/dev/null || true)"
          if [[ -n "${release}" && "$(jq -r .tag_name <<<"${release}")" = "${ROOT_TAG}" && "$(jq -r .draft <<<"${release}")" = true ]]; then
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}"
          fi
