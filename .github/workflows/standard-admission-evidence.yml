name: Build signed Standard Form admission evidence

on:
  workflow_dispatch:
    inputs:
      snapshot_commit:
        description: Exact retained-report snapshot commit
        required: true
        type: string
      snapshot_tree:
        description: Exact Git tree for the retained-report snapshot
        required: true
        type: string
      host_candidate_path:
        description: Retained host-report candidate directory
        required: true
        type: string
      host_candidate_tree:
        description: Exact Git tree for the retained host candidate
        required: true
        type: string
      host_source_commit:
        description: Exact Takosumi source commit authenticated by the host candidate
        required: true
        type: string
      host_takoform_source_commit:
        description: Exact Takoform source commit executed by the host candidate
        required: true
        type: string
      host_run_id:
        description: Exact protected host workflow run retained in source
        required: true
        type: string
      host_manifest_digest:
        description: SHA-256 of the retained host manifest
        required: true
        type: string
      host_signed_manifest_digest:
        description: SHA-256 of the retained signed host candidate
        required: true
        type: string
      provider_candidate_path:
        description: Retained provider-report candidate directory
        required: true
        type: string
      provider_candidate_tree:
        description: Exact Git tree for the retained provider candidate
        required: true
        type: string
      provider_source_commit:
        description: Exact Takoform source commit executed by the provider candidate
        required: true
        type: string
      provider_run_id:
        description: Exact protected provider workflow run retained in source
        required: true
        type: string
      provider_manifest_digest:
        description: SHA-256 of the retained provider manifest
        required: true
        type: string
      provider_signed_manifest_digest:
        description: SHA-256 of the retained signed provider candidate
        required: true
        type: string
      admission_version:
        description: Immutable admission release version to assemble
        required: true
        type: string

run-name: standard-admission-evidence:${{ inputs.admission_version }}:${{ github.sha }}

concurrency:
  group: standard-admission-evidence-${{ inputs.admission_version }}-${{ github.sha }}
  cancel-in-progress: false

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  EXPECTED_COSIGN_VERSION: "v3.0.6"
  HOST_REPORT_IDENTITY: https://github.com/tako0614/takosumi/.github/workflows/standard-form-host-report.yml@refs/heads/main
  PROVIDER_REPORT_IDENTITY: https://github.com/tako0614/terraform-provider-takoform/.github/workflows/standard-provider-report.yml@refs/heads/main
  EVIDENCE_IDENTITY: https://github.com/tako0614/terraform-provider-takoform/.github/workflows/standard-admission-evidence.yml@refs/heads/main
  OIDC_ISSUER: https://token.actions.githubusercontent.com

jobs:
  assemble:
    name: Authenticate reports and assemble deterministic material
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
      source_commit: ${{ steps.source.outputs.source_commit }}
      source_commit_short: ${{ steps.source.outputs.source_commit_short }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.snapshot_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Bind the assembly to one protected-main attempt
        id: source
        shell: bash
        env:
          SNAPSHOT_COMMIT: ${{ inputs.snapshot_commit }}
          SNAPSHOT_TREE: ${{ inputs.snapshot_tree }}
          HOST_CANDIDATE_PATH: ${{ inputs.host_candidate_path }}
          HOST_CANDIDATE_TREE: ${{ inputs.host_candidate_tree }}
          HOST_SOURCE_COMMIT: ${{ inputs.host_source_commit }}
          HOST_TAKOFORM_SOURCE_COMMIT: ${{ inputs.host_takoform_source_commit }}
          HOST_RUN_ID: ${{ inputs.host_run_id }}
          HOST_MANIFEST_DIGEST: ${{ inputs.host_manifest_digest }}
          HOST_SIGNED_MANIFEST_DIGEST: ${{ inputs.host_signed_manifest_digest }}
          PROVIDER_CANDIDATE_PATH: ${{ inputs.provider_candidate_path }}
          PROVIDER_CANDIDATE_TREE: ${{ inputs.provider_candidate_tree }}
          PROVIDER_SOURCE_COMMIT: ${{ inputs.provider_source_commit }}
          PROVIDER_RUN_ID: ${{ inputs.provider_run_id }}
          PROVIDER_MANIFEST_DIGEST: ${{ inputs.provider_manifest_digest }}
          PROVIDER_SIGNED_MANIFEST_DIGEST: ${{ inputs.provider_signed_manifest_digest }}
          ADMISSION_VERSION: ${{ inputs.admission_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test "${GITHUB_REF}" = "refs/heads/main"
          current_main="$(gh api "repos/${GITHUB_REPOSITORY}/commits/main" --jq .sha)"
          test "${GITHUB_SHA}" = "${current_main}"
          if ! git cat-file -e "${current_main}^{commit}" 2>/dev/null; then
            git fetch --no-tags origin "${current_main}"
          fi
          [[ "${SNAPSHOT_COMMIT}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${SNAPSHOT_TREE}" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "${SNAPSHOT_COMMIT}"
          test "$(git rev-parse HEAD^{tree})" = "${SNAPSHOT_TREE}"
          git merge-base --is-ancestor "${SNAPSHOT_COMMIT}" "${current_main}"
          [[ "${HOST_CANDIDATE_PATH}" =~ ^admission/v1/candidates/host-report-[0-9][0-9A-Za-z.-]*-[0-9a-f]{12}-[0-9a-f]{12}$ ]]
          [[ "${PROVIDER_CANDIDATE_PATH}" =~ ^admission/v1/candidates/provider-report-[0-9][0-9A-Za-z.-]*-[0-9a-f]{12}$ ]]
          [[ "${HOST_CANDIDATE_TREE}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${PROVIDER_CANDIDATE_TREE}" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse "${SNAPSHOT_COMMIT}:${HOST_CANDIDATE_PATH}")" = "${HOST_CANDIDATE_TREE}"
          test "$(git rev-parse "${SNAPSHOT_COMMIT}:${PROVIDER_CANDIDATE_PATH}")" = "${PROVIDER_CANDIDATE_TREE}"
          test "$(git cat-file -t "${HOST_CANDIDATE_TREE}")" = tree
          test "$(git cat-file -t "${PROVIDER_CANDIDATE_TREE}")" = tree
          for commit in "${HOST_SOURCE_COMMIT}" "${HOST_TAKOFORM_SOURCE_COMMIT}" "${PROVIDER_SOURCE_COMMIT}"; do
            [[ "${commit}" =~ ^[0-9a-f]{40}$ ]]
          done
          [[ "${HOST_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${PROVIDER_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
          for digest in "${HOST_MANIFEST_DIGEST}" "${HOST_SIGNED_MANIFEST_DIGEST}" "${PROVIDER_MANIFEST_DIGEST}" "${PROVIDER_SIGNED_MANIFEST_DIGEST}"; do
            [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]
          done
          [[ "${ADMISSION_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]
          test "$(git rev-parse "${HOST_TAKOFORM_SOURCE_COMMIT}^{commit}")" = "${HOST_TAKOFORM_SOURCE_COMMIT}"
          test "$(git rev-parse "${PROVIDER_SOURCE_COMMIT}^{commit}")" = "${PROVIDER_SOURCE_COMMIT}"
          git merge-base --is-ancestor "${HOST_TAKOFORM_SOURCE_COMMIT}" "${SNAPSHOT_COMMIT}"
          git merge-base --is-ancestor "${PROVIDER_SOURCE_COMMIT}" "${SNAPSHOT_COMMIT}"
          test "$(jq -er '.source.commit' "${HOST_CANDIDATE_PATH}/host-report-manifest.json")" = "${HOST_SOURCE_COMMIT}"
          test "$(jq -er '.takoformSource.commit' "${HOST_CANDIDATE_PATH}/host-report-manifest.json")" = "${HOST_TAKOFORM_SOURCE_COMMIT}"
          test "$(jq -er '.workflowRunId' "${HOST_CANDIDATE_PATH}/signed-host-report-candidate.json")" = "${HOST_RUN_ID}"
          test "$(jq -er '.source.commit' "${PROVIDER_CANDIDATE_PATH}/provider-report-manifest.json")" = "${PROVIDER_SOURCE_COMMIT}"
          test "$(jq -er '.workflowRunId' "${PROVIDER_CANDIDATE_PATH}/signed-provider-report-candidate.json")" = "${PROVIDER_RUN_ID}"
          test "sha256:$(sha256sum "${HOST_CANDIDATE_PATH}/host-report-manifest.json" | cut -d ' ' -f 1)" = "${HOST_MANIFEST_DIGEST}"
          test "sha256:$(sha256sum "${HOST_CANDIDATE_PATH}/signed-host-report-candidate.json" | cut -d ' ' -f 1)" = "${HOST_SIGNED_MANIFEST_DIGEST}"
          test "sha256:$(sha256sum "${PROVIDER_CANDIDATE_PATH}/provider-report-manifest.json" | cut -d ' ' -f 1)" = "${PROVIDER_MANIFEST_DIGEST}"
          test "sha256:$(sha256sum "${PROVIDER_CANDIDATE_PATH}/signed-provider-report-candidate.json" | cut -d ' ' -f 1)" = "${PROVIDER_SIGNED_MANIFEST_DIGEST}"
          {
            echo "source_commit=${SNAPSHOT_COMMIT}"
            echo "source_commit_short=${SNAPSHOT_COMMIT:0:12}"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "HOST_CANDIDATE_PATH=${HOST_CANDIDATE_PATH}"
            echo "PROVIDER_CANDIDATE_PATH=${PROVIDER_CANDIDATE_PATH}"
            echo "HOST_SOURCE_COMMIT=${HOST_SOURCE_COMMIT}"
            echo "HOST_TAKOFORM_SOURCE_COMMIT=${HOST_TAKOFORM_SOURCE_COMMIT}"
            echo "PROVIDER_SOURCE_COMMIT=${PROVIDER_SOURCE_COMMIT}"
            echo "HOST_RUN_ID=${HOST_RUN_ID}"
            echo "PROVIDER_RUN_ID=${PROVIDER_RUN_ID}"
          } >> "${GITHUB_ENV}"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2, Cosign v3.0.6

      - name: Offline-verify every exact retained report before generation
        shell: bash
        run: |
          set -euo pipefail
          grep -F "${EXPECTED_COSIGN_VERSION}" <<<"$(cosign version 2>&1)"
          test "$(find "${HOST_CANDIDATE_PATH}" -type l | wc -l)" -eq 0
          test "$(find "${PROVIDER_CANDIDATE_PATH}" -type l | wc -l)" -eq 0
          test "$(find "${HOST_CANDIDATE_PATH}" -type f | wc -l)" -eq 23
          test "$(find "${PROVIDER_CANDIDATE_PATH}" -type f | wc -l)" -eq 23
          mapfile -t host_reports < <(find "${HOST_CANDIDATE_PATH}/packages" -mindepth 2 -maxdepth 2 -type f -name host-report.json | sort)
          mapfile -t provider_reports < <(find "${PROVIDER_CANDIDATE_PATH}/packages" -mindepth 2 -maxdepth 2 -type f -name provider-report.json | sort)
          test "${#host_reports[@]}" -eq 10
          test "${#provider_reports[@]}" -eq 10
          for report in "${host_reports[@]}"; do
            cosign verify-blob "${report}" --bundle "${report%.json}.sigstore.json" \
              --trusted-root admission/v1/trust/trusted-root.json \
              --certificate-identity "${HOST_REPORT_IDENTITY}" \
              --certificate-oidc-issuer "${OIDC_ISSUER}"
          done
          for report in "${provider_reports[@]}"; do
            cosign verify-blob "${report}" --bundle "${report%.json}.sigstore.json" \
              --trusted-root admission/v1/trust/trusted-root.json \
              --certificate-identity "${PROVIDER_REPORT_IDENTITY}" \
              --certificate-oidc-issuer "${OIDC_ISSUER}"
          done

      - name: Build the exact material twice
        shell: bash
        env:
          ADMISSION_VERSION: ${{ inputs.admission_version }}
        run: |
          set -euo pipefail
          first="${RUNNER_TEMP}/material-first"
          second="${RUNNER_TEMP}/material-second"
          go run ./cmd/standard-admission-material build \
            --host-reports "${HOST_CANDIDATE_PATH}" \
            --provider-reports "${PROVIDER_CANDIDATE_PATH}" \
            --output-dir "${first}" \
            --admission-version "${ADMISSION_VERSION}" \
            --host-source-commit "${HOST_SOURCE_COMMIT}" \
            --host-takoform-source-commit "${HOST_TAKOFORM_SOURCE_COMMIT}" \
            --provider-source-commit "${PROVIDER_SOURCE_COMMIT}" \
            --host-run-id "${HOST_RUN_ID}" \
            --provider-run-id "${PROVIDER_RUN_ID}"
          go run ./cmd/standard-admission-material build \
            --host-reports "${HOST_CANDIDATE_PATH}" \
            --provider-reports "${PROVIDER_CANDIDATE_PATH}" \
            --output-dir "${second}" \
            --admission-version "${ADMISSION_VERSION}" \
            --host-source-commit "${HOST_SOURCE_COMMIT}" \
            --host-takoform-source-commit "${HOST_TAKOFORM_SOURCE_COMMIT}" \
            --provider-source-commit "${PROVIDER_SOURCE_COMMIT}" \
            --host-run-id "${HOST_RUN_ID}" \
            --provider-run-id "${PROVIDER_RUN_ID}"
          diff -ru "${first}" "${second}"
          test "$(find "${first}" -type f | wc -l)" -eq 51
          test "$(find "${first}" -type l | wc -l)" -eq 0

      - name: Close the unsigned handoff
        shell: bash
        run: |
          set -euo pipefail
          handoff="${RUNNER_TEMP}/admission-evidence-handoff"
          mkdir "${handoff}"
          cp -a "${HOST_CANDIDATE_PATH}" "${handoff}/host"
          cp -a "${PROVIDER_CANDIDATE_PATH}" "${handoff}/provider"
          cp -a "${RUNNER_TEMP}/material-first" "${handoff}/material"
          test "$(find "${handoff}" -type l | wc -l)" -eq 0
          (
            cd "${handoff}"
            find host provider material -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum > HANDOFF_SHA256SUMS
            sha256sum --check --strict HANDOFF_SHA256SUMS
          )

      - name: Upload the unsigned same-run handoff
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: standard-admission-evidence-handoff-${{ steps.source.outputs.source_commit }}
          path: ${{ runner.temp }}/admission-evidence-handoff/
          if-no-files-found: error
          retention-days: 1

  sign:
    name: Sign only the exact evidence subjects
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: assemble
    environment: standard-admission-evidence
    permissions:
      actions: read
      id-token: write
    steps:
      - name: Reject an incomplete same-run artifact binding
        shell: bash
        env:
          ARTIFACT_ID: ${{ needs.assemble.outputs.artifact_id }}
          ARTIFACT_DIGEST: ${{ needs.assemble.outputs.artifact_digest }}
        run: |
          set -euo pipefail
          [[ "${ARTIFACT_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${ARTIFACT_DIGEST}" =~ ^(sha256:)?[0-9a-f]{64}$ ]]
          test "${GITHUB_RUN_ATTEMPT}" = "1"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.assemble.outputs.artifact_id }}
          path: ${{ runner.temp }}/handoff
          digest-mismatch: error

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2, Cosign v3.0.6

      - name: Verify the handoff and sign only ten evidence files
        shell: bash
        run: |
          set -euo pipefail
          grep -F "${EXPECTED_COSIGN_VERSION}" <<<"$(cosign version 2>&1)"
          test "$(find "${RUNNER_TEMP}/handoff" -type l | wc -l)" -eq 0
          (
            cd "${RUNNER_TEMP}/handoff"
            sha256sum --check --strict HANDOFF_SHA256SUMS
          )
          mapfile -t evidence < <(find "${RUNNER_TEMP}/handoff/material/packages" -mindepth 2 -maxdepth 2 -type f -name evidence.json | sort)
          test "${#evidence[@]}" -eq 10
          for subject in "${evidence[@]}"; do
            bundle="${subject%.json}.sigstore.json"
            test ! -e "${bundle}"
            cosign sign-blob "${subject}" --bundle "${bundle}" --yes
            cosign verify-blob "${subject}" --bundle "${bundle}" \
              --certificate-identity "${EVIDENCE_IDENTITY}" \
              --certificate-oidc-issuer "${OIDC_ISSUER}"
          done
          test "$(find "${RUNNER_TEMP}/handoff/material" -type f | wc -l)" -eq 61

      - name: Upload the closed signed candidate without publishing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: standard-admission-evidence-candidate-${{ inputs.admission_version }}-${{ needs.assemble.outputs.source_commit_short }}
          path: ${{ runner.temp }}/handoff/material/
          if-no-files-found: error
          retention-days: 90

      - name: Record the non-publication boundary
        shell: bash
        env:
          ADMISSION_VERSION: ${{ inputs.admission_version }}
        run: |
          {
            echo "### Standard Form admission evidence candidate"
            echo ""
            echo "- source: \`${{ needs.assemble.outputs.source_commit }}\`"
            echo "- admission version: \`${ADMISSION_VERSION}\`"
            echo "- signed evidence subjects: 10"
            echo "- release, tag, registry, contents write, or production mutation: none"
          } >> "${GITHUB_STEP_SUMMARY}"
