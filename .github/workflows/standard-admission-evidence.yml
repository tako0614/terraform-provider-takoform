name: Build signed Standard Form admission evidence

on:
  workflow_dispatch:
    inputs:
      host_run_id:
        description: Successful Takosumi standard-form-host-report workflow run id
        required: true
        type: string
      provider_run_id:
        description: Successful Takoform standard-provider-report workflow run id
        required: true
        type: string
      admission_version:
        description: Immutable admission release version to assemble
        required: true
        type: string

run-name: standard-admission-evidence:${{ inputs.admission_version }}:${{ github.sha }}

concurrency:
  group: standard-admission-evidence-${{ inputs.admission_version }}-${{ github.sha }}
  cancel-in-progress: false

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  EXPECTED_COSIGN_VERSION: "v3.0.6"
  HOST_REPORT_IDENTITY: https://github.com/tako0614/takosumi/.github/workflows/standard-form-host-report.yml@refs/heads/main
  PROVIDER_REPORT_IDENTITY: https://github.com/tako0614/terraform-provider-takoform/.github/workflows/standard-provider-report.yml@refs/heads/main
  EVIDENCE_IDENTITY: https://github.com/tako0614/terraform-provider-takoform/.github/workflows/standard-admission-evidence.yml@refs/heads/main
  OIDC_ISSUER: https://token.actions.githubusercontent.com

jobs:
  assemble:
    name: Authenticate reports and assemble deterministic material
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
      source_commit: ${{ steps.source.outputs.source_commit }}
      source_commit_short: ${{ steps.source.outputs.source_commit_short }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Bind the assembly to one protected-main attempt
        id: source
        shell: bash
        env:
          HOST_RUN_ID: ${{ inputs.host_run_id }}
          PROVIDER_RUN_ID: ${{ inputs.provider_run_id }}
          ADMISSION_VERSION: ${{ inputs.admission_version }}
        run: |
          set -euo pipefail
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test "${GITHUB_REF}" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test "$(git rev-parse refs/remotes/origin/main)" = "${GITHUB_SHA}"
          [[ "${HOST_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${PROVIDER_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${ADMISSION_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]
          {
            echo "source_commit=${GITHUB_SHA}"
            echo "source_commit_short=${GITHUB_SHA:0:12}"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2, Cosign v3.0.6

      - name: Download the exact cross-repository and same-repository candidates
        shell: bash
        env:
          TAKOSUMI_TOKEN: ${{ secrets.TAKOSUMI_ACTIONS_READ_TOKEN }}
          REPOSITORY_TOKEN: ${{ github.token }}
          HOST_RUN_ID: ${{ inputs.host_run_id }}
          PROVIDER_RUN_ID: ${{ inputs.provider_run_id }}
          SOURCE_SHORT: ${{ steps.source.outputs.source_commit_short }}
        run: |
          set -euo pipefail
          test -n "${TAKOSUMI_TOKEN}"
          host_run="$(GH_TOKEN="${TAKOSUMI_TOKEN}" gh api "repos/tako0614/takosumi/actions/runs/${HOST_RUN_ID}")"
          jq -e '.event == "workflow_dispatch" and .conclusion == "success" and .head_branch == "main" and .run_attempt == 1' <<<"${host_run}" >/dev/null
          host_source_commit="$(jq -er '.head_sha | select(test("^[0-9a-f]{40}$"))' <<<"${host_run}")"
          provider_run="$(GH_TOKEN="${REPOSITORY_TOKEN}" gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${PROVIDER_RUN_ID}")"
          jq -e --arg commit "${GITHUB_SHA}" '.event == "workflow_dispatch" and .conclusion == "success" and .head_branch == "main" and .head_sha == $commit and .run_attempt == 1' <<<"${provider_run}" >/dev/null

          host_artifacts="$(GH_TOKEN="${TAKOSUMI_TOKEN}" gh api "repos/tako0614/takosumi/actions/runs/${HOST_RUN_ID}/artifacts?per_page=100")"
          host_name="takosumi-standard-form-host-report-candidate-1.0.1-${host_source_commit:0:12}-${SOURCE_SHORT}"
          mapfile -t host_names < <(jq -r --arg name "${host_name}" '.artifacts[] | select(.expired == false and .name == $name) | .name' <<<"${host_artifacts}")
          test "${#host_names[@]}" -eq 1
          provider_name="takoform-standard-provider-report-candidate-1.0.1-${SOURCE_SHORT}"
          provider_artifacts="$(GH_TOKEN="${REPOSITORY_TOKEN}" gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${PROVIDER_RUN_ID}/artifacts?per_page=100")"
          test "$(jq -r --arg name "${provider_name}" '[.artifacts[] | select(.expired == false and .name == $name)] | length' <<<"${provider_artifacts}")" -eq 1

          mkdir -p "${RUNNER_TEMP}/host" "${RUNNER_TEMP}/provider"
          GH_TOKEN="${TAKOSUMI_TOKEN}" gh run download "${HOST_RUN_ID}" -R tako0614/takosumi -n "${host_names[0]}" -D "${RUNNER_TEMP}/host"
          GH_TOKEN="${REPOSITORY_TOKEN}" gh run download "${PROVIDER_RUN_ID}" -R "${GITHUB_REPOSITORY}" -n "${provider_name}" -D "${RUNNER_TEMP}/provider"
          echo "HOST_SOURCE_COMMIT=${host_source_commit}" >> "${GITHUB_ENV}"

      - name: Cryptographically verify every exact report before generation
        shell: bash
        run: |
          set -euo pipefail
          grep -F "${EXPECTED_COSIGN_VERSION}" <<<"$(cosign version 2>&1)"
          test "$(find "${RUNNER_TEMP}/host" -type l | wc -l)" -eq 0
          test "$(find "${RUNNER_TEMP}/provider" -type l | wc -l)" -eq 0
          mapfile -t host_reports < <(find "${RUNNER_TEMP}/host/packages" -mindepth 2 -maxdepth 2 -type f -name host-report.json | sort)
          mapfile -t provider_reports < <(find "${RUNNER_TEMP}/provider/packages" -mindepth 2 -maxdepth 2 -type f -name provider-report.json | sort)
          test "${#host_reports[@]}" -eq 10
          test "${#provider_reports[@]}" -eq 10
          for report in "${host_reports[@]}"; do
            cosign verify-blob "${report}" --bundle "${report%.json}.sigstore.json" \
              --certificate-identity "${HOST_REPORT_IDENTITY}" \
              --certificate-oidc-issuer "${OIDC_ISSUER}"
          done
          for report in "${provider_reports[@]}"; do
            cosign verify-blob "${report}" --bundle "${report%.json}.sigstore.json" \
              --certificate-identity "${PROVIDER_REPORT_IDENTITY}" \
              --certificate-oidc-issuer "${OIDC_ISSUER}"
          done

      - name: Build the exact material twice
        shell: bash
        env:
          ADMISSION_VERSION: ${{ inputs.admission_version }}
          HOST_RUN_ID: ${{ inputs.host_run_id }}
          PROVIDER_RUN_ID: ${{ inputs.provider_run_id }}
        run: |
          set -euo pipefail
          first="${RUNNER_TEMP}/material-first"
          second="${RUNNER_TEMP}/material-second"
          go run ./cmd/standard-admission-material build \
            --host-reports "${RUNNER_TEMP}/host" \
            --provider-reports "${RUNNER_TEMP}/provider" \
            --output-dir "${first}" \
            --admission-version "${ADMISSION_VERSION}" \
            --host-source-commit "${HOST_SOURCE_COMMIT}" \
            --host-run-id "${HOST_RUN_ID}" \
            --provider-run-id "${PROVIDER_RUN_ID}"
          go run ./cmd/standard-admission-material build \
            --host-reports "${RUNNER_TEMP}/host" \
            --provider-reports "${RUNNER_TEMP}/provider" \
            --output-dir "${second}" \
            --admission-version "${ADMISSION_VERSION}" \
            --host-source-commit "${HOST_SOURCE_COMMIT}" \
            --host-run-id "${HOST_RUN_ID}" \
            --provider-run-id "${PROVIDER_RUN_ID}"
          diff -ru "${first}" "${second}"
          test "$(find "${first}" -type f | wc -l)" -eq 51
          test "$(find "${first}" -type l | wc -l)" -eq 0

      - name: Close the unsigned handoff
        shell: bash
        run: |
          set -euo pipefail
          handoff="${RUNNER_TEMP}/admission-evidence-handoff"
          mkdir "${handoff}"
          cp -a "${RUNNER_TEMP}/host" "${handoff}/host"
          cp -a "${RUNNER_TEMP}/provider" "${handoff}/provider"
          cp -a "${RUNNER_TEMP}/material-first" "${handoff}/material"
          test "$(find "${handoff}" -type l | wc -l)" -eq 0
          (
            cd "${handoff}"
            find host provider material -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum > HANDOFF_SHA256SUMS
            sha256sum --check --strict HANDOFF_SHA256SUMS
          )

      - name: Upload the unsigned same-run handoff
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: standard-admission-evidence-handoff-${{ steps.source.outputs.source_commit }}
          path: ${{ runner.temp }}/admission-evidence-handoff/
          if-no-files-found: error
          retention-days: 1

  sign:
    name: Sign only the exact evidence subjects
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: assemble
    environment: standard-admission-evidence
    permissions:
      actions: read
      id-token: write
    steps:
      - name: Reject an incomplete same-run artifact binding
        shell: bash
        env:
          ARTIFACT_ID: ${{ needs.assemble.outputs.artifact_id }}
          ARTIFACT_DIGEST: ${{ needs.assemble.outputs.artifact_digest }}
        run: |
          set -euo pipefail
          [[ "${ARTIFACT_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${ARTIFACT_DIGEST}" =~ ^(sha256:)?[0-9a-f]{64}$ ]]
          test "${GITHUB_RUN_ATTEMPT}" = "1"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.assemble.outputs.artifact_id }}
          path: ${{ runner.temp }}/handoff
          digest-mismatch: error

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2, Cosign v3.0.6

      - name: Verify the handoff and sign only ten evidence files
        shell: bash
        run: |
          set -euo pipefail
          grep -F "${EXPECTED_COSIGN_VERSION}" <<<"$(cosign version 2>&1)"
          test "$(find "${RUNNER_TEMP}/handoff" -type l | wc -l)" -eq 0
          (
            cd "${RUNNER_TEMP}/handoff"
            sha256sum --check --strict HANDOFF_SHA256SUMS
          )
          mapfile -t evidence < <(find "${RUNNER_TEMP}/handoff/material/packages" -mindepth 2 -maxdepth 2 -type f -name evidence.json | sort)
          test "${#evidence[@]}" -eq 10
          for subject in "${evidence[@]}"; do
            bundle="${subject%.json}.sigstore.json"
            test ! -e "${bundle}"
            cosign sign-blob "${subject}" --bundle "${bundle}" --yes
            cosign verify-blob "${subject}" --bundle "${bundle}" \
              --certificate-identity "${EVIDENCE_IDENTITY}" \
              --certificate-oidc-issuer "${OIDC_ISSUER}"
          done
          test "$(find "${RUNNER_TEMP}/handoff/material" -type f | wc -l)" -eq 61

      - name: Upload the closed signed candidate without publishing
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: standard-admission-evidence-candidate-${{ inputs.admission_version }}-${{ needs.assemble.outputs.source_commit_short }}
          path: ${{ runner.temp }}/handoff/material/
          if-no-files-found: error
          retention-days: 90

      - name: Record the non-publication boundary
        shell: bash
        env:
          ADMISSION_VERSION: ${{ inputs.admission_version }}
        run: |
          {
            echo "### Standard Form admission evidence candidate"
            echo ""
            echo "- source: \`${{ needs.assemble.outputs.source_commit }}\`"
            echo "- admission version: \`${ADMISSION_VERSION}\`"
            echo "- signed evidence subjects: 10"
            echo "- release, tag, registry, contents write, or production mutation: none"
          } >> "${GITHUB_STEP_SUMMARY}"
