name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          persist-credentials: false
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # pinned: v6.0.0
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: |
            go.sum
            cmd/provider-release/go.sum
      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            printf 'The following files need gofmt:\n%s\n' "$unformatted"
            exit 1
          fi
      - name: Verify provider module
        run: |
          go mod verify
          go vet ./...
          go test ./...
          go run ./cmd/conformance verify
          go run ./cmd/form-package conformance
          go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
          go run github.com/google/go-licenses@v1.6.0 check ./... \
            --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MIT,MPL-2.0
      - name: Verify isolated release tooling
        run: |
          go -C cmd/provider-release mod verify
          go -C cmd/provider-release vet ./...
          go -C cmd/provider-release test ./...
          go -C cmd/provider-release run . verify-source --allow-untagged-candidate
          go -C cmd/provider-release run . verify-reproducible --allow-untagged-candidate
