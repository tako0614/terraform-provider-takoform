name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned: v6.0.2 (2026)
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # pinned: v6.0.0
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: |
            go.sum
            cmd/provider-release/go.sum
      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # pinned: v2
        with:
          tofu_version: 1.12.1
          tofu_wrapper: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # pinned: v4.0.1
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false
      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            printf 'The following files need gofmt:\n%s\n' "$unformatted"
            exit 1
          fi
      - name: Verify provider module
        run: |
          go mod verify
          go vet ./...
          go test ./...
          go run ./cmd/provider-lifecycle-conformance matrix --opentofu tofu --terraform terraform
          go run ./cmd/provider-lifecycle-conformance provider-reports \
            --cli terraform --output-dir "$RUNNER_TEMP/provider-reports"
          test "$(find "$RUNNER_TEMP/provider-reports" -name provider-report.json -type f | wc -l)" -eq 10
          go run ./cmd/conformance verify
          go run ./cmd/migration-proof
          go run ./cmd/form-package conformance
          go run ./cmd/standard-form-conformance verify
          go run ./cmd/standard-form-conformance candidate-publication-check
          go run ./cmd/standard-form-conformance published-package-check
          go test ./cmd/form-package-release
          go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
          go run github.com/google/go-licenses@v1.6.0 check ./... \
            --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MIT,MPL-2.0
      - name: Enforce append-only revocation statements
        if: ${{ github.event_name == 'pull_request' }}
        run: >-
          go run ./cmd/form-package-release check-revocations
          --base "${{ github.event.pull_request.base.sha }}"
      - name: Build deterministic Form Package candidate evidence
        run: |
          go run ./cmd/form-package-release build-package \
            --tag forms/k-iv4gc3lqnrsvg5dpojsq/v1.0.0 \
            --package-dir conformance/form-package-v1/positive/example-store \
            --tooling-commit "$GITHUB_SHA" \
            --output "$RUNNER_TEMP/form-package-candidate" \
            --allow-untagged-candidate
      - name: Verify isolated release tooling
        run: |
          go -C cmd/provider-release mod verify
          go -C cmd/provider-release vet ./...
          go -C cmd/provider-release test ./...
          go -C cmd/provider-release run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
          go -C cmd/provider-release run . verify-source --allow-untagged-candidate
          go -C cmd/provider-release run . verify-reproducible --allow-untagged-candidate
