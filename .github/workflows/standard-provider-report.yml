name: Build signed standard provider reports

on:
  workflow_dispatch:

run-name: standard-provider-report:${{ github.sha }}

concurrency:
  group: standard-provider-report-${{ github.sha }}
  cancel-in-progress: false

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  EXPECTED_COSIGN_VERSION: "v3.0.6"
  REPORT_IDENTITY: https://github.com/tako0614/terraform-provider-takoform/.github/workflows/standard-provider-report.yml@refs/heads/main

jobs:
  generate:
    name: Execute the provider and close ten unsigned reports
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
      artifact_name: ${{ steps.source.outputs.artifact_name }}
      source_commit: ${{ steps.source.outputs.source_commit }}
      source_commit_short: ${{ steps.source.outputs.source_commit_short }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Bind this one-attempt run to protected main
        id: source
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test "${GITHUB_REF}" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test "$(git rev-parse refs/remotes/origin/main)" = "${GITHUB_SHA}"
          {
            echo "source_commit=${GITHUB_SHA}"
            echo "source_commit_short=${GITHUB_SHA:0:12}"
            echo "artifact_name=takoform-standard-provider-report-unsigned-1.0.1-${GITHUB_SHA:0:12}"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # pinned: v2
        with:
          tofu_version: 1.12.1
          tofu_wrapper: false

      - name: Execute exact candidate fixtures without signing authority
        shell: bash
        run: |
          set -euo pipefail
          go mod verify
          go test ./internal/providerreport ./internal/admissionrelease
          output="${RUNNER_TEMP}/provider-report-candidate"
          go run ./cmd/provider-lifecycle-conformance provider-reports \
            --cli tofu --output-dir "${output}" --source-commit "${GITHUB_SHA}"
          go run ./cmd/provider-lifecycle-conformance verify-provider-reports \
            --input-dir "${output}" --source-commit "${GITHUB_SHA}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Upload the exact unsigned closure
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.source.outputs.artifact_name }}
          path: ${{ runner.temp }}/provider-report-candidate/
          if-no-files-found: error
          retention-days: 1

  sign:
    name: Authenticate the exact report subjects
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: generate
    environment: standard-provider-report
    permissions:
      id-token: write
    steps:
      - name: Reject an incomplete same-run artifact binding
        shell: bash
        env:
          ARTIFACT_ID: ${{ needs.generate.outputs.artifact_id }}
          ARTIFACT_DIGEST: ${{ needs.generate.outputs.artifact_digest }}
          SOURCE_COMMIT: ${{ needs.generate.outputs.source_commit }}
        run: |
          set -euo pipefail
          [[ "${ARTIFACT_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${ARTIFACT_DIGEST}" =~ ^(sha256:)?[0-9a-f]{64}$ ]]
          [[ "${SOURCE_COMMIT}" =~ ^[0-9a-f]{40}$ ]]
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test "${SOURCE_COMMIT}" = "${GITHUB_SHA}"

      - name: Download only the immutable artifact id from this run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.generate.outputs.artifact_id }}
          path: unsigned
          digest-mismatch: error

      - name: Revalidate canonical inventory and all ten subjects
        shell: bash
        env:
          SOURCE_COMMIT: ${{ needs.generate.outputs.source_commit }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");
          const root = "unsigned";
          const digest = (raw) => `sha256:${crypto.createHash("sha256").update(raw).digest("hex")}`;
          const canonicalValue = (value) => Array.isArray(value) ? value.map(canonicalValue) : value && typeof value === "object" ? Object.fromEntries(Object.keys(value).sort().map((key) => [key, canonicalValue(value[key])])) : value;
          const canonical = (value) => Buffer.from(JSON.stringify(canonicalValue(value)));
          const same = (left, right) => canonical(left).equals(canonical(right));
          const readCanonical = (name) => { const raw = fs.readFileSync(path.join(root, name)); const value = JSON.parse(raw); if (!raw.equals(canonical(value))) throw new Error(`${name} is not exact canonical JSON`); return {raw, value}; };
          const expected = new Map([
            ["container-service", ["ContainerService", "sha256:f39586a6ca97ee474b3e130b0a2a57ba81d40282632cd44fa65631cfbd17c7cf", "sha256:5adfb7dd11a3f462bb2bad94ba9abbcb097c92afa0987d9cc1fa0783d00f3b05"]],
            ["durable-workflow", ["DurableWorkflow", "sha256:9b6e5e0d28d8ea35527ae20756c9ed1eb57907e93ff6a44ae300dbbf72b80d45", "sha256:05db4bd34b3361eb933ff284f40c1dd17a9f4025c5b5a2ade56a838996a69b90"]],
            ["edge-worker", ["EdgeWorker", "sha256:1d20c21cad95deec873359e218729be53ceaf0a8abfbdcc860be2a4ac0c7c722", "sha256:63e87939660c898837290f0cc8e64e0098106eb4e7cba97a984762d2beaaabb3"]],
            ["kv-store", ["KVStore", "sha256:137e97cbce057aac1ef8e9af3f00bb9ca3a3967131bf2d920c252d5249b6e96f", "sha256:964c0bdc7445440f93f2ee6318eb9bf6356f8d749d12a7eb904e90141e312dca"]],
            ["object-bucket", ["ObjectBucket", "sha256:4584b9233ef23231037d941c652eedd67c184deb9e36bec14d41151a28b7c2b4", "sha256:00f3ed05da56cc795a42043112933ef00e97b531ed123e0c2df3cce70bd1e391"]],
            ["queue", ["Queue", "sha256:93308869c7fd95654ee5009efe329d43452d11c59d36f61b5fc79b0a2fbe4646", "sha256:609958d46da6f74f3a29e0940fb628e9c455c353d41d9457791c5859360ad8cc"]],
            ["schedule", ["Schedule", "sha256:b44b0e785453c32133c53bfded6c75d1e95bd5860bdf54d874bb4b330a4c2508", "sha256:ebf03b9e2d90b4fe0444e6dfe824758637639a79e0e267616258e7b28e8d690e"]],
            ["sql-database", ["SQLDatabase", "sha256:ecd201ad6a2156dabed0f1afbbea242c3f994fce37d2edf6f676342cd6937246", "sha256:714a6c3de551598788b25e208783c08b7e8059f10fb96873f5a34b321075c401"]],
            ["stateful-actor-namespace", ["StatefulActorNamespace", "sha256:c82fa8458e333ce20160f052c255ee94636219bbdea6a46d4730852411050be4", "sha256:d6bd34aac538485161ff9045c8a8f9d8dc6193f28f1667cc7bef84a85dbf85d7"]],
            ["vector-index", ["VectorIndex", "sha256:f0db5c150198bec614485074cc10c8ee1533edddf11a7374f1aaa7cdebc77fea", "sha256:adffdb7d630eb44b03c8f4cd4a8ef2295e66318ea81b1fa88be6dfdd20dd429b"]],
          ]);
          const {value: manifest} = readCanonical("provider-report-manifest.json");
          if (manifest.format !== "takoform.standard-provider-report-candidate@v1" || manifest.status !== "candidate-only" || manifest.proofType !== "provider" || manifest.subject !== "provider:registry.opentofu.org/tako0614/takoform" || manifest.definitionVersion !== "1.0.1" || manifest.packageVersion !== "1.0.1" || manifest.runnerVersion !== "0.1.3" || manifest.source?.repository !== "https://github.com/tako0614/terraform-provider-takoform.git" || manifest.source?.commit !== process.env.SOURCE_COMMIT || manifest.reports?.length !== 10) throw new Error("provider-report manifest identity drift");
          const files = ["provider-report-manifest.json"];
          const seen = new Set();
          for (const entry of manifest.reports) {
            const want = expected.get(entry.slug);
            if (!want || seen.has(entry.slug) || entry.kind !== want[0] || entry.path !== `packages/${entry.slug}/provider-report.json` || entry.bundlePath !== `packages/${entry.slug}/provider-report.sigstore.json`) throw new Error("report descriptor closure drift");
            seen.add(entry.slug);
            const {raw, value: report} = readCanonical(entry.path);
            const identity = {formRef:{apiVersion:"forms.takoform.com/v1alpha1",kind:want[0],definitionVersion:"1.0.1",schemaDigest:want[1]},packageDigest:want[2]};
            if (entry.digest !== digest(raw) || !same(entry.identity, identity) || report.format !== "takoform.standard-runner-report@v1" || report.role !== "provider-report" || report.status !== "passed" || report.subject !== manifest.subject || report.runnerVersion !== manifest.runnerVersion || !same(report.identity, identity)) throw new Error(`${entry.slug} identity or digest drift`);
            const lifecycleKeys = ["create","delete","drift","import","observe","read","refresh","update"];
            const reportKeys = ["format","identity","lifecycle","negativeFixtures","positiveFixtures","role","runnerVersion","status","subject"];
            if (!same(Object.keys(report).sort(), reportKeys) || !same(Object.keys(report.lifecycle ?? {}).sort(), lifecycleKeys) || !Object.values(report.lifecycle ?? {}).every((value) => value === true) || !same(report.positiveFixtures,[{name:"canonical",passed:true}]) || !same(report.negativeFixtures,[{errorCode:"invalid_argument",name:"reject-invalid-semantics",passed:true}])) throw new Error(`${entry.slug} proof closure drift`);
            files.push(entry.path);
          }
          if (seen.size !== expected.size) throw new Error("report set incomplete");
          const actual = [];
          const walk = (dir) => { for (const name of fs.readdirSync(dir)) { const full = path.join(dir, name); const stat = fs.lstatSync(full); if (stat.isSymbolicLink()) throw new Error(`symlink ${full}`); if (stat.isDirectory()) walk(full); else if (stat.isFile() && stat.size <= 16 * 1024 * 1024) actual.push(path.relative(root, full).split(path.sep).join("/")); else throw new Error(`invalid file ${full}`); } };
          walk(root);
          if (JSON.stringify(actual.sort()) !== JSON.stringify(files.sort())) throw new Error("unsigned artifact contains missing or extra files");
          NODE

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2, Cosign v3.0.6

      - name: Sign each exact report and build the signed handoff
        shell: bash
        env:
          ARTIFACT_ID: ${{ needs.generate.outputs.artifact_id }}
          ARTIFACT_DIGEST: ${{ needs.generate.outputs.artifact_digest }}
          SOURCE_COMMIT: ${{ needs.generate.outputs.source_commit }}
        run: |
          set -euo pipefail
          grep -F "${EXPECTED_COSIGN_VERSION}" <<<"$(cosign version 2>&1)"
          while IFS= read -r report; do
            bundle="${report%.json}.sigstore.json"
            cosign sign-blob "unsigned/${report}" --bundle "unsigned/${bundle}" --yes
            cosign verify-blob "unsigned/${report}" --bundle "unsigned/${bundle}" \
              --certificate-identity "${REPORT_IDENTITY}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          done < <(node -e 'const m=require("./unsigned/provider-report-manifest.json"); for (const r of m.reports) console.log(r.path)')
          ARTIFACT_ID="${ARTIFACT_ID}" ARTIFACT_DIGEST="${ARTIFACT_DIGEST}" SOURCE_COMMIT="${SOURCE_COMMIT}" node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");
          const root = "unsigned";
          const digest = (raw) => `sha256:${crypto.createHash("sha256").update(raw).digest("hex")}`;
          const sorted = (value) => Array.isArray(value) ? value.map(sorted) : value && typeof value === "object" ? Object.fromEntries(Object.keys(value).sort().map((key) => [key, sorted(value[key])])) : value;
          const manifestRaw = fs.readFileSync(path.join(root, "provider-report-manifest.json"));
          const manifest = JSON.parse(manifestRaw);
          const reports = manifest.reports.map((entry) => {
            const bundlePath = entry.bundlePath;
            return {kind:entry.kind,slug:entry.slug,reportPath:entry.path,reportDigest:entry.digest,bundlePath,bundleDigest:digest(fs.readFileSync(path.join(root,bundlePath)))};
          });
          const candidate = {
            format:"takoform.standard-provider-report-signed-candidate@v1", status:"candidate-only", proofType:"provider",
            subject:manifest.subject, certificateIdentity:process.env.REPORT_IDENTITY,
            workflow:".github/workflows/standard-provider-report.yml", workflowRunId:process.env.GITHUB_RUN_ID,
            workflowRunAttempt:1, source:manifest.source,
            manifest:{path:"provider-report-manifest.json",digest:digest(manifestRaw)}, entries:reports,
          };
          fs.writeFileSync(path.join(root,"signed-provider-report-candidate.json"), JSON.stringify(sorted(candidate)));
          const files = ["provider-report-manifest.json","signed-provider-report-candidate.json",...reports.flatMap((r) => [r.reportPath,r.bundlePath])].sort();
          fs.writeFileSync(path.join(root,"SHA256SUMS"), files.map((name) => `${digest(fs.readFileSync(path.join(root,name))).slice(7)}  ${name}`).join("\n")+"\n");
          NODE
          (cd unsigned && sha256sum --check --strict SHA256SUMS)

      - name: Upload the signed provider-report candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: takoform-standard-provider-report-candidate-1.0.1-${{ needs.generate.outputs.source_commit_short }}
          path: unsigned/
          if-no-files-found: error
          retention-days: 90
