name: Release Form Package revocation checkpoint

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Exact existing forms/revocations/v<semver> tag
        required: true
        type: string
      expected_commit:
        description: Exact approved 40-character tag commit
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: form-package-revocation-${{ inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  EXPECTED_COSIGN_VERSION: "v3.0.6"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: form-package-release
    steps:
      - name: Check out the trusted main workflow and release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify trusted main and the exact approved tag commit
        id: source
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" || "$(git rev-parse HEAD)" != "$GITHUB_SHA" || "$(git rev-parse refs/remotes/origin/main)" != "$GITHUB_SHA" ]]; then
            echo "Release dispatch must execute the current protected main commit" >&2
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^forms/revocations/v[0-9][0-9A-Za-z.+-]*$ ]]; then
            echo "Revocation releases require forms/revocations/v<semver>" >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "expected_commit must be an exact lowercase 40-character Git commit" >&2
            exit 1
          fi
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          tag_commit="$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")"
          test "$tag_commit" = "$EXPECTED_COMMIT"
          git merge-base --is-ancestor "$tag_commit" refs/remotes/origin/main
          {
            echo "tag=$RELEASE_TAG"
            echo "commit=$tag_commit"
          } >> "$GITHUB_OUTPUT"

      - name: Check out the untrusted tagged revocation source separately
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          path: release-source
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache: true

      - name: Install pinned Cosign v3
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2, Cosign v3.0.6

      - name: Build cumulative checkpoint evidence with trusted main tooling
        id: build
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.source.outputs.tag }}
          EXPECTED_COMMIT: ${{ steps.source.outputs.commit }}
        run: |
          set -euo pipefail
          test "$(git -C release-source rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git -C release-source status --porcelain=v1 --untracked-files=all)"
          cosign_version="$(cosign version 2>&1)"
          grep -F "$EXPECTED_COSIGN_VERSION" <<<"$cosign_version"
          go test ./formpackage ./cmd/form-package-release
          output="$RUNNER_TEMP/form-package-revocation"
          go run ./cmd/form-package-release build-revocation \
            --repo "$GITHUB_WORKSPACE/release-source" \
            --tag "$RELEASE_TAG" \
            --output "$output"
          subject="$(jq -r .signedSubject "$output/release-manifest.json")"
          bundle="$(jq -r .signatureBundle "$output/release-manifest.json")"
          identity="$(jq -r .publisherPolicy.identity "$output/release-manifest.json")"
          {
            echo "output=$output"
            echo "subject=$subject"
            echo "bundle=$bundle"
            echo "identity=$identity"
          } >> "$GITHUB_OUTPUT"

      - name: Refuse an existing release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.source.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "A GitHub release already owns $RELEASE_TAG; refusing overwrite" >&2
            exit 1
          fi

      - name: Keyless-sign the cumulative revocation checkpoint
        shell: bash
        run: |
          set -euo pipefail
          output="${{ steps.build.outputs.output }}"
          subject="$output/${{ steps.build.outputs.subject }}"
          bundle="$output/${{ steps.build.outputs.bundle }}"
          cosign sign-blob "$subject" --bundle "$bundle" --yes
          cosign verify-blob "$subject" \
            --bundle "$bundle" \
            --certificate-identity "${{ steps.build.outputs.identity }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          go run ./cmd/form-package-release finalize-bundle --output "$output"
          (cd "$output" && sha256sum --check --strict SHA256SUMS)

      - name: Create this run's verified revocation draft
        id: draft
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.source.outputs.tag }}
        run: |
          set -euo pipefail
          response="$(gh api --method POST "repos/$GITHUB_REPOSITORY/releases" \
            -f tag_name="$RELEASE_TAG" -f name="$RELEASE_TAG" -F draft=true \
            -f body='Signed cumulative Takoform Form Package revocation checkpoint. Referenced package bytes remain retained for observe and delete.')"
          release_id="$(jq -r .id <<<"$response")"
          test "$release_id" != "null"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

      - name: Upload the exact local asset inventory
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.source.outputs.tag }}
        run: |
          set -euo pipefail
          while IFS= read -r asset; do
            gh release upload "$RELEASE_TAG" "$asset"
          done < <(find "${{ steps.build.outputs.output }}" -maxdepth 1 -type f -print | sort)

      - name: Verify this run's exact draft release inventory
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.draft.outputs.release_id }}
        run: |
          set -euo pipefail
          find "${{ steps.build.outputs.output }}" -maxdepth 1 -type f -printf '%f\n' | sort > "$RUNNER_TEMP/expected-assets.txt"
          gh api --paginate "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" --jq '.[].name' | sort > "$RUNNER_TEMP/actual-assets.txt"
          diff -u "$RUNNER_TEMP/expected-assets.txt" "$RUNNER_TEMP/actual-assets.txt"
          test "$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq .draft)" = "true"

      - name: Attest exact revocation checkpoint inventory
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            ${{ steps.build.outputs.output }}/*.json
            ${{ steps.build.outputs.output }}/SHA256SUMS

      - name: Publish this run's verified immutable revocation release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.draft.outputs.release_id }}
        run: |
          set -euo pipefail
          finalized="$(gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -F draft=false)"
          test "$(jq -r .draft <<<"$finalized")" = "false"

      - name: Remove partial draft after failure
        if: ${{ always() && !success() }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.draft.outputs.release_id }}
          RELEASE_TAG: ${{ steps.source.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_ID" ]]; then
            exit 0
          fi
          release_json="$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" 2>/dev/null || true)"
          if [[ -n "$release_json" && "$(jq -r .draft <<<"$release_json")" == "true" && "$(jq -r .tag_name <<<"$release_json")" == "$RELEASE_TAG" ]]; then
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID"
          fi
